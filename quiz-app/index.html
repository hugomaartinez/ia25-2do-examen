alse, "feedback": ""}], "feedback": "Lapolítica óptimase deriva de la Q-Table de forma sencilla: para cada estado s, la acción óptima es aquella con elmayor Q-value: π(s) = argmax_a Q(s, a). Es decir, el agente mira los Q-values de todas las acciones posibles en su estado actual y elige la que tiene el valor más alto. Durante la evaluación (deployment), se usa ε=0 para seguir la política pura sin exploración. La Q-Table visualizada como flechas muestra la dirección óptima desde cada estado.", "rightAnswer": "A resposta correcta é:Para cada estado, elegir la acción con mayor Q-value.", "hasCorrectMarked": true}, {"num": 47, "status": "incorrect", "question": "Una inmobiliaria dispone de datos de 200.000 viviendas vendidas incluyendo: metros cuadrados, habitaciones, categoría (piso/casa/adosado), código postal, valor catastral, año de construcción y precio de venta. Quieren predecir el precio de futuras viviendas. ¿Cuál es el planteamiento correcto del problema?", "options": [{"text": "a. Aprendizaje por refuerzo donde el agente aprende ajustando precios según la respuesta del mercado inmobiliario", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Aprendizaje supervisado de clasificación, categorizando las viviendas en rangos de precio (bajo, medio, alto, premium)", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Aprendizaje no supervisado con clustering para agrupar viviendas similares y asignar precios según el grupo", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Tenemos el precio real de cada vivienda; no necesitamos descubrir grupos, sino predecir valores."}, {"text": "d. Aprendizaje supervisado de regresión, ya que el precio es un valor numérico continuo disponible en los datos de entrenamiento", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El precio es un valor numérico continuo que queremos predecir a partir de otras características. Esto define un problema de regresión supervisada.", "rightAnswer": "A resposta correcta é: Aprendizaje supervisado de regresión, ya que el precio es un valor numérico continuo disponible en los datos de entrenamiento", "hasCorrectMarked": true}, {"num": 48, "status": "correct", "question": "En un sistema de detección de vídeos seguros para niños, se decide priorizar una muy alta precisión (Precision) sobre la exhaustividad (Recall). ¿Cuál es la implicación principal de esta decisión?", "options": [{"text": "a. El Recall será también muy alto.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. El sistema dejará pasar algunos vídeos inapropiados, pero detectará casi todos los seguros.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. El sistema descartará (clasificará como no-seguros) muchos vídeos que en realidad eran seguros, para garantizar la pureza de los positivos.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Aumenta FN para minimizar FP (donde positivo = seguro)."}, {"text": "d. El sistema tendrá una tasa alta de falsos positivos (vídeos inapropiados marcados como seguros).", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Priorizar la precisión significa que cuando el sistema dice \"Es seguro\", queremos estar absolutamente seguros de que es verdad. Para lograr esto, el sistema se vuelve muy conservador y solo aprueba lo evidente. La consecuencia es que descartará muchos vídeos que eran seguros (Falsos Negativos), porque no estaba 100% seguro.", "rightAnswer": "A resposta correcta é: El sistema descartará (clasificará como no-seguros) muchos vídeos que en realidad eran seguros, para garantizar la pureza de los positivos.", "hasCorrectMarked": true}, {"num": 49, "status": "correct", "question": "Si dos agentes Minimax perfectos juegan al Tres en Raya uno contra el otro, ¿cuál es el resultado inevitable?", "options": [{"text": "a. Depende de la semilla aleatoria utilizada.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. El segundo jugador (O) siempre gana.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. El primer jugador (X) siempre gana.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Un Empate.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto."}], "feedback": "El Tres en Raya es un juego resuelto y es un empate teórico. Si ambos jugadores juegan perfectamente (como hace Minimax), ninguno puede forzar una victoria, resultando inevitablemente en unEmpate.", "rightAnswer": "A resposta correcta é: Un Empate.", "hasCorrectMarked": true}, {"num": 50, "status": "correct", "question": "Se dispone de datos de tráfico de red (IPs, puertos, volumen) sin etiquetas de ataques previos y se desea identificar posibles intrusiones nuevas o comportamientos extraños. ¿Qué enfoque es el más apropiado?", "options": [{"text": "a. Detección de anomalías no supervisada (Anomaly Detection).", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto."}, {"text": "b. Clasificación multiclase supervisada.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Aprendizaje por Refuerzo (Reinforcement Learning).", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Clasificación multietiqueta.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Al no tener etiquetas históricas (es decir, no sabemos qué era ataque y qué no), no podemos usar clasificación supervisada. Se requiere un enfoque deDetección de Anomalías no supervisada(ej. Isolation Forest, One-Class SVM) que modele el comportamiento \"normal\" y marque como anomalía lo que se desvíe significativamente.", "rightAnswer": "A resposta correcta é: Detección de anomalías no supervisada (Anomaly Detection).", "hasCorrectMarked": true}, {"num": 51, "status": "notanswered", "question": "¿Cuál es el objetivo de Support Vector Machines (SVM)?", "options": [{"text": "a. Minimiza el error de clasificación sumando errores por cada punto mal clasificado usando gradient descent.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Proyecta datos a un espacio de menor dimensión donde las clases se vuelven separables.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Encuentra hiperplano que maximiza margen entre clases.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Encuentra múltiples vectores de soporte que juntos forman una barrera de clasificación mediante voting.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "SVM lineal busca elhiperplano separador que maximiza el margenentre clases. El margen es la distancia entre el hiperplano y los puntos más cercanos de cada clase. Lossupport vectorsson precisamente esos puntos más cercanos al hiperplano que \"soportan\" la posición del margen óptimo. Solo los support vectors influyen en la posición del hiperplano; otros puntos pueden eliminarse sin cambiar el modelo. Para datos no linealmente separables, se usankernels(RBF, polynomial) que mapean a espacios de mayor dimensión.", "rightAnswer": "A resposta correcta é:Encuentra hiperplano que maximiza margen entre clases.", "hasCorrectMarked": true}, {"num": 52, "status": "correct", "question": "Al usar StandardScaler en un entorno predictivo correcto, ¿cuál es el procedimiento exacto para transformar los conjuntos de entrenamiento (Train) y prueba (Test)?", "options": [{"text": "a. scaler.fit(X_test) para obtener la referencia real y luego scaler.transform(X_train) .", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. scaler.fit(X) (todo el dataset) y luego separar en Train y Test.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. scaler.fit(X_train) , luego scaler.transform(X_train) y scaler.transform(X_test) .", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Aprendemos de Train, aplicamos a todo."}, {"text": "d. scaler.fit_transform(X_train) y luego scaler.fit_transform(X_test) .", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Debes hacerfitSOLO en Train para aprender sus estadísticas, y luego usar esos parámetros para hacertransformtanto en Train como en Test. Nunca hacerfiten Test.", "rightAnswer": "A resposta correcta é:scaler.fit(X_train), luegoscaler.transform(X_train)yscaler.transform(X_test).", "hasCorrectMarked": true}, {"num": 53, "status": "notanswered", "question": "¿Qué representa exactamente un valor almacenado en la Q-Table (Q-Value) para un par estado-acción dado?", "options": [{"text": "a. La predicción de la recompensa futura total que se obtendrá al tomar esa acción en ese estado.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. La recompensa inmediata que se recibirá en el siguiente paso solamente.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. El número de veces que el agente ha visitado ese estado.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. La probabilidad de que esa acción sea correcta.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El Q-Value (Quality Value) es la predicción de larecompensa futura acumulada(descontada) que el agente espera obtener si toma esa acción específica en ese estado y luego sigue la política óptima.", "rightAnswer": "A resposta correcta é:La predicción de la recompensa futura total que se obtendrá al tomar esa acción en ese estado.", "hasCorrectMarked": true}, {"num": 54, "status": "correct", "question": "Q-Learning utiliza una estructura de datos llamada Q-Table. ¿Qué representa la Q-Table y qué información almacena?", "options": [{"text": "a. Tabla que almacena Q-values para cada par (estado, acción) con la recompensa futura esperada al tomar acción a en estado s siguiendo la política óptima.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. La Q-Table es el \"conocimiento\" del agente sobre qué tan buena es cada acción en cada estado, medido en recompensa futura esperada."}, {"text": "b. Tabla de probabilidades de transición entre estados, indicando la probabilidad de llegar a cada estado siguiente.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Tabla de recompensas inmediatas para cada estado en función de la acción que se tome, definida por el entorno antes del entrenamiento.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Tabla que mapea estados a acciones directamente, indicando qué acción tomar en cada estado.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "LaQ-Tablees como una \"hoja de trucos\" que el agente construye durante el aprendizaje. AlmacenaQ-valuespara cada par (estado, acción). El Q-value Q(s, a) representa larecompensa futura esperadasi el agente toma la acción a en el estado s y luego sigue la política óptima. Las filas representan estados, las columnas representan acciones, y cada celda contiene el Q-value estimado. Se inicializa típicamente a ceros.", "rightAnswer": "A resposta correcta é:Tabla que almacena Q-values para cada par (estado, acción) con la recompensa futura esperada al tomar acción a en estado s siguiendo la política óptima.", "hasCorrectMarked": true}, {"num": 55, "status": "correct", "question": "Aplicas listwise deletion (borrar filas con algún nulo). ¿Cuál es el principal riesgo metodológico señalado?", "options": [{"text": "a. Garantiza estimadores insesgados en cualquier mecanismo de falta.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Aumentas fuga de datos porque el dataset es más pequeño.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Es idéntico a imputar con la media, lo cual sería un error conceptual en este contexto.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Pierdes información válida de otras columnas y reduces potencia; puede introducir sesgo si no es MCAR.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. El coste es doble: menos datos y sesgo potencial."}], "feedback": "Borrar filas elimina información válida de otras columnas, reduce potencia y puede sesgar si el mecanismo no es MCAR.", "rightAnswer": "A resposta correcta é: Pierdes información válida de otras columnas y reduces potencia; puede introducir sesgo si no es MCAR.", "hasCorrectMarked": true}, {"num": 56, "status": "incorrect", "question": "¿Qué define correctamente al conjunto de validación ?", "options": [{"text": "a. Es el conjunto de datos final que se entrega al cliente para su validación manual.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Es un subconjunto del conjunto de prueba (Test) utilizado para comparar modelos.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. NUNCA se debe tocar el conjunto de Test. Validación sale del Training original."}, {"text": "c. Es un subconjunto disjunto del entrenamiento utilizado para ajustar hiperparámetros y seleccionar modelos.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Es una técnica para poder comprobar la calidad del modelo en todos los datos haciendo divisiones sucesivas.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El conjunto de validación es una partición intermedia: no se usa para el entrenamiento directo (backprop/ajuste de pesos), pero se usa frecuentemente durante el entrenamiento para evaluar el rendimiento y tomar decisiones sobre hiperparámetros y parada temprana (early stopping).", "rightAnswer": "A resposta correcta é: Es un subconjunto disjunto del entrenamiento utilizado para ajustar hiperparámetros y seleccionar modelos.", "hasCorrectMarked": true}, {"num": 57, "status": "correct", "question": "¿Qué efecto tiene limitar la profundidad máxima ( max_depth ) de un Árbol de Decisión?", "options": [{"text": "a. Limita la profundidad del arbol para garantizar que cada nodo final (hoja) tenga una única muestra muestra, buscando un mejor ajuste que puede optimizarse.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Permite suavizar la pendiente de la recta de regresión, evitando overfitting.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Actúa como un regularizador, simplificando el modelo para reducir el overfitting.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto."}, {"text": "d. Escala automáticamente las características de entrada para evitar que las ramas en ordenes de magnitud menores eclipsen a las mayores, haciendo que sus features asociadas sean ignoradas aunque puedan tener una mayor correlación con la variable objetivo.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Limitarmax_depthimpide que el árbol crezca indefinidamente para ajustarse a cada ejemplo de entrenamiento. Actúa como unregularizador: reduce la varianza (evita overfitting) al simplificar el modelo, aunque si se limita demasiado puede aumentar el sesgo (underfitting).", "rightAnswer": "A resposta correcta é:Actúa como un regularizador, simplificando el modelo para reducir el overfitting.", "hasCorrectMarked": true}, {"num": 58, "status": "notanswered", "question": "Tienes una variable categórica sin orden semántico (p.ej., tipos de zona). Asignas números 1..K a las categorías y entrenas un modelo basado en distancia. ¿Cuál es el problema conceptual principal?", "options": [{"text": "a. Convierte la variable en MNAR.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Reduce dimensionalidad, por lo que siempre es mejor que one-hot.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Induce una noción falsa de cercanía/similitud entre categorías.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Impide generalizar porque los enteros no son normalizables.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Un encoding ordinal introduce una geometría artificial: hace que categorías “cercanas” numéricamente parezcan más similares, aunque no lo sean.", "rightAnswer": "A resposta correcta é:Induce una noción falsa de cercanía/similitud entre categorías.", "hasCorrectMarked": true}, {"num": 59, "status": "notanswered", "question": "¿Qué es el muestreo bootstrap (bagging) en el contexto de Random Forests?", "options": [{"text": "a. Los datos se dividen equitativamente entre los árboles sin reemplazo", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Cada árbol se entrena con un conjunto de datos completamente diferente y sin superposición", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Cada árbol se entrena con una muestra aleatoria de los datos de entrenamiento, extraída con reemplazo", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Todos los árboles se entrenan exactamente con los mismos datos", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "", "rightAnswer": "A resposta correcta é: Cada árbol se entrena con una muestra aleatoria de los datos de entrenamiento, extraída con reemplazo", "hasCorrectMarked": true}, {"num": 60, "status": "correct", "question": "La Q-Table necesita ser inicializada antes del entrenamiento. ¿Cuál es la forma más común de inicializar la Q-Table y por qué?", "options": [{"text": "a. Copiar los Q-values de un agente previamente entrenado en un entorno similar (transfer learning)", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Inicializar con valores aleatorios de una distribución normal para romper simetría entre acciones", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Calcular Q-values iniciales a partir de las recompensas conocidas del entorno usando programación dinámica", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Inicializar todos los Q-values a cero, representando que el agente \"no sabe nada\" al inicio; los valores se actualizan mediante exploración y recompensas", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Ceros es la inicialización más neutral y común, dejando que el aprendizaje determine los valores verdaderos."}], "feedback": "La forma más común esinicializar todos los Q-values a cero:Q_table = np.zeros((num_states, num_actions)). Esto representa que el agente \"no sabe nada\" al inicio - no tiene preferencia por ninguna acción en ningún estado. Conforme explora y recibe recompensas, los Q-values se actualizan. Una alternativa es inicialización optimista (valores altos) que fomenta exploración temprana, pero ceros es lo más simple y común.", "rightAnswer": "A resposta correcta é: Inicializar todos los Q-values a cero, representando que el agente \"no sabe nada\" al inicio; los valores se actualizan mediante exploración y recompensas", "hasCorrectMarked": true}, {"num": 61, "status": "incorrect", "question": "¿Cómo realiza predicciones un Random Forest en tareas de clasificación?", "options": [{"text": "a. Promediando las probabilidades numéricas de todos los árboles", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Por votación mayoritaria: gana la clase que recibe más votos de los árboles individuales", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Tomando la mediana de las predicciones de los árboles", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Usando solo la predicción del árbol con mejor rendimiento en entrenamiento", "correct": false, "selected": true, "selected_wrong": true, "feedback": ""}], "feedback": "", "rightAnswer": "A resposta correcta é: Por votación mayoritaria: gana la clase que recibe más votos de los árboles individuales", "hasCorrectMarked": true}, {"num": 62, "status": "notanswered", "question": "En el dataset de Tiroides, donde ~90% de los casos son negativos, ¿por qué la \"Accuracy\" (Exactitud) se considera una métrica engañosa?", "options": [{"text": "a. La exactitud no puede llegar al 100% cuando hay más de dos clases.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Es computacionalmente costoso de calcular en datasets desbalanceados, haciendo que sea una métrica confusa, y necesitando promediarla con otras.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Sobreestima el rendimiento en la clase minoritaria al ponderarla demasiado.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Un modelo ingenuo que prediga \"negativo\" para todos lograría ~90% de exactitud fallando en detectar cualquier caso de enfermedad .", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Debido al desequilibrio de clases, un modelo \"ingenuo\" que prediga \"negativo\" para todos los pacientes lograría un 90% de exactitud, aparentando ser excelente, pero fallaría en detectar el 100% de los casos reales de enfermedad (Recall = 0%). Esto lo hace clínicamente inútil.", "rightAnswer": "A resposta correcta é:Un modelo ingenuo que prediga \"negativo\" para todos lograría ~90% de exactitud fallando en detectar cualquier caso de enfermedad .", "hasCorrectMarked": true}, {"num": 63, "status": "incorrect", "question": "¿Qué tipo de método de aprendizaje automático son los árboles de decisión?", "options": [{"text": "a. Método de aprendizaje supervisado profundo", "correct": false, "selected": true, "selected_wrong": true, "feedback": ""}, {"text": "b. Método de aprendizaje supervisado no paramétrico", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Método de aprendizaje supervisado paramétrico", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Método de aprendizaje no supervisado no paramétrico", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "", "rightAnswer": "A resposta correcta é: Método de aprendizaje supervisado no paramétrico", "hasCorrectMarked": true}, {"num": 64, "status": "incorrect", "question": "¿Cómo maneja Random Forest (en versiones modernas de Scikit-Learn o XGBoost) los valores faltantes (NaN) de forma nativa en comparación con la Regresión Logística?", "options": [{"text": "a. Usa K-Nearest Neighbors para estimar el valor faltante basado en filas similares.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Aprende una dirección óptima para los valores faltantes en cada división del árbol durante el entrenamiento, mientras que la Regresión Logística requiere imputación explícita.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Por defecto rellena los valores faltantes con la mediana de la columna, aunque se puede configurar para que use la media con el parámetro \"with_mean=True\".", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Eso sería imputación simple y se haría con StandarScaler, donde sí existe ese parámetro."}, {"text": "d. Ignora las filas con valores faltantes durante el entrenamiento (eliminación por lista).", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Aprende una dirección óptima (hijo izquierdo o derecho) para los valores faltantes en cada división del árbol durante el entrenamiento. Esto permite que el modelo use la información de \"dato faltante\" para discriminar, mientras que la Regresión Logística requiere imputación numérica explícita antes de entrenar.", "rightAnswer": "A resposta correcta é: Aprende una dirección óptima para los valores faltantes en cada división del árbol durante el entrenamiento, mientras que la Regresión Logística requiere imputación explícita.", "hasCorrectMarked": true}, {"num": 65, "status": "incorrect", "question": "Un modelo de predicción de precios de vivienda utiliza como features: metros cuadrados, número de habitaciones, código postal y año de construcción. ¿Por qué podría ser insuficiente una regresión lineal simple para este problema?", "options": [{"text": "a. El año de construcción debe convertirse a antigüedad porque los años no pueden usarse directamente sin escalar.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. El año como número es válido; el problema está en variables categóricas como código postal."}, {"text": "b. El número de habitaciones es demasiado discreto para una regresión que requiere variables continuas", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Los precios de vivienda siempre siguen distribuciones no gaussianas que invalidan la regresión lineal", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. El código postal es una variable categórica sin orden numérico natural; no tiene relación lineal con el precio y requiere encoding especial", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El código postal es categórico y no tiene relación lineal con el precio. Requiere tratamiento especial (encoding) y/o modelos no lineales.", "rightAnswer": "A resposta correcta é: El código postal es una variable categórica sin orden numérico natural; no tiene relación lineal con el precio y requiere encoding especial", "hasCorrectMarked": true}, {"num": 66, "status": "correct", "question": "¿Cómo realiza predicciones un Random Forest en tareas de regresión?", "options": [{"text": "a. Por votación mayoritaria de los valores numéricos", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Usando la predicción del árbol más profundo", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Tomando el valor máximo predicho por cualquier árbol", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Promediando las predicciones de todos los árboles", "correct": true, "selected": true, "selected_wrong": false, "feedback": ""}], "feedback": "", "rightAnswer": "A resposta correcta é: Promediando las predicciones de todos los árboles", "hasCorrectMarked": true}, {"num": 67, "status": "correct", "question": "Observas un histograma de la variable \"edad\" en un dataset médico. Casi todo el espacio del eje X está vacío , con la inmensa mayoría de las barras concentradas en el extremo izquierdo (0-100) y unas pocas observaciones dispersas hacia valores como 455, 65511, 65512. ¿Qué indica esto?", "options": [{"text": "a. Hay outliers extremos o errores de entrada de datos que son imposibles y deben corregirse o eliminarse", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. El histograma se distorsiona por valores imposibles que indican errores de datos."}, {"text": "b. Es necesario aplicar escalado para que la distribución se vuelva normal, evitando la influencia de los outliers.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Hay que comprobar si la distribución es normal, en cuyo caso no sería necesario hacer nada.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Es necesario aplicar una transforamación logarítmica para mitigar el impacto de los valores extremos.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Este patrón indica la presencia deoutliers extremoso, más probablemente,errores de entrada de datos. Edades como 455 o 65511 son imposibles para seres humanos y representan errores tipográficos o de transcripción (ej: alguien escribió \"45\" como \"455\", o hubo corrupción de datos). El histograma \"aplasta\" los datos reales en el extremo izquierdo porque el eje X debe extenderse hasta los valores erróneos. La solución requierelimpieza de datos: filtrar o corregir estos valores imposibles (ej: capping a 100 años máximo).", "rightAnswer": "A resposta correcta é:Hay outliers extremos o errores de entrada de datos que son imposibles y deben corregirse o eliminarse", "hasCorrectMarked": true}, {"num": 68, "status": "notanswered", "question": "¿Cuál es la diferencia principal entre Clasificación (aprendizaje supervisado) y Clustering (aprendizaje no supervisado)?", "options": [{"text": "a. Clasificación requiere necesariamente más datos que Clustering para poder funcionar correctamente.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. En Clasificación las etiquetas son conocidas de antemano; en Clustering se descubren los grupos.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Clustering solo funciona con datos numéricos, mientras que Clasificación puede manejar todo tipo de datos.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Clasificación es más precisa que Clustering, por lo que siempre es preferible cuando sea posible utilizarla.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "EnClasificación, las clases/etiquetas estánpredefinidasy el modelo aprende a asignar nuevas instancias a esas clases conocidas. EnClustering, los gruposse descubrena partir de los datos sin etiquetas previas; el algoritmo encuentra estructura oculta.", "rightAnswer": "A resposta correcta é: En Clasificación las etiquetas son conocidas de antemano; en Clustering se descubren los grupos.", "hasCorrectMarked": true}, {"num": 69, "status": "notanswered", "question": "En regresión, RMSE penaliza más los errores grandes que MAE. ¿En qué escenario tiene más sentido preferir RMSE?", "options": [{"text": "a. Cuando quieres robustez a outliers y tratar todos los errores por igual.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Cuando necesitas una métrica no diferenciable para optimización por gradiente.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Cuando los errores grandes son especialmente indeseables y quieres penalizarlos desproporcionadamente.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Cuando hay fuga de datos y necesitas compensarla.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "RMSE eleva al cuadrado los errores: castiga fuertemente grandes desviaciones. Es útil cuando los “fallos catastróficos” son especialmente costosos.", "rightAnswer": "A resposta correcta é: Cuando los errores grandes son especialmente indeseables y quieres penalizarlos desproporcionadamente.", "hasCorrectMarked": true}, {"num": 70, "status": "incorrect", "question": "Tanto clustering como association rule mining son técnicas de aprendizaje no supervisado. ¿Cuál es la diferencia fundamental entre clustering y association rule mining ?", "options": [{"text": "a. Clustering agrupa instancias similares (ej. clientes); association rule mining descubre relaciones entre items (ej. productos comprados juntos).", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Clustering es supervisado y requiere etiquetas mientras que association rule mining es completamente no supervisado.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Clustering es determinístico y siempre produce el mismo resultado mientras que association mining puede producir resultados diferentes en cada ejecución.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Clustering produce un modelo que puede aplicarse a nuevos datos mientras que association mining solo describe los datos de entrenamiento.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Ambos pueden producir modelos aplicables a nuevos datos. La diferencia es que uno agrupa instancias y el otro descubre relaciones entre items."}], "feedback": "Mientras queclustering agrupa instancias(como clientes) basándose en su similitud,association rule mining descubre relaciones entre items. Por ejemplo, clustering podría agrupar clientes similares, mientras que association rule mining descubriría que clientes que compran pan también tienden a comprar mantequilla (\"market basket analysis\"). Son perspectivas complementarias sobre la estructura de los datos.", "rightAnswer": "A resposta correcta é:Clustering agrupa instancias similares (ej. clientes); association rule mining descubre relaciones entre items (ej. productos comprados juntos).", "hasCorrectMarked": true}, {"num": 71, "status": "incorrect", "question": "¿Cuál de los siguientes escenarios describe mejor a un modelo que sufre de Alta Varianza (Overfitting) ?", "options": [{"text": "a. El modelo tiene error cero en el conjunto de test.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. El modelo tiene un error bajo tanto en el conjunto de entrenamiento como en el de test.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. El modelo tiene un error mucho más bajo en entrenamiento que en test.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. El modelo tiene un error muy bajo en el conjunto de test pero un error alto en el conjunto de entrenamiento.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Eso es inusual y suele indicar problemas de distribución de datos, no overfitting."}], "feedback": "El Overfitting (Alta Varianza) se caracteriza por un rendimiento excelente en el conjunto de entrenamiento (baja bias, memorización) pero un rendimiento pobre en el conjunto de test (mala generalización). El modelo ha \"aprendido\" el ruido específico del entrenamiento.", "rightAnswer": "A resposta correcta é:El modelo tiene un error mucho más bajo en entrenamiento que en test.", "hasCorrectMarked": true}, {"num": 72, "status": "correct", "question": "Si disponemos de un listado de transacciones sin etiquetar (cantidad, fecha, ubicación...), ¿qué enfoque de aprendizaje automático es el más adecuado inicialmente para detectar posibles usos fraudulentos?", "options": [{"text": "a. Algoritmos Genéticos", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Aprendizaje Supervisado", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Aprendizaje No Supervisado", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Permite detectar valores atípicos (anomalías) sin necesidad de haber visto fraudes previos etiquetados."}, {"text": "d. Aprendizaje por Refuerzo", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Al no tener etiquetas históricas (o ser el fraude muy raro y cambiante), se suele aplicarAprendizaje No Supervisado, específicamente técnicas de Detección de Anomalías (Anomaly Detection) para encontrar patrones que se desvíen significativamente del comportamiento normal.", "rightAnswer": "A resposta correcta é: Aprendizaje No Supervisado", "hasCorrectMarked": true}, {"num": 73, "status": "incorrect", "question": "¿Qué minimiza K-Means durante su ejecución?", "options": [{"text": "a. El error de clasificación respecto a las etiquetas reales.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. El número de clústeres creados.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. La inercia (suma de las distancias al cuadrado de cada punto a su centroide más cercano).", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. La distancia entre los diferentes centroides (separación).", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Maximiza la separación indirectamente, pero minimiza la cohesión interna."}], "feedback": "K-Means intenta minimizar laInercia(o suma de cuadrados dentro del clúster - WCSS). Es decir, busca minimizar la distancia cuadrada de cada punto respecto al centroide de su clúster asignado, haciendo los clústeres lo más compactos posible.", "rightAnswer": "A resposta correcta é: La inercia (suma de las distancias al cuadrado de cada punto a su centroide más cercano).", "hasCorrectMarked": true}, {"num": 74, "status": "notanswered", "question": "¿Qué define fundamentalmente al Aprendizaje Supervisado ?", "options": [{"text": "a. Un paradigma donde el dataset de entrenamiento incluye explícitamente la variable objetivo (etiqueta) para cada ejemplo.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Un modelo que se entrena a sí mismo de forma autónoma sin ninguna intervención ni dato previo.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Un tipo de aprendizaje donde se supervisa el proceso indicando recompensas o castigos tras una secuencia de acciones.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Un enfoque que busca patrones o estructuras ocultas en datos no etiquetados.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "En el aprendizaje supervisado, cada ejemplo de entrenamiento incluye tanto las features (entradas) como la etiqueta o valor objetivo (\"ground truth\"). El objetivo es aprender una función que mapee las entradas a las salidas para predecir etiquetas en datos nuevos.", "rightAnswer": "A resposta correcta é: Un paradigma donde el dataset de entrenamiento incluye explícitamente la variable objetivo (etiqueta) para cada ejemplo.", "hasCorrectMarked": true}, {"num": 75, "status": "incorrect", "question": "Después de entrenar un modelo K-Means con scikit-learn, ¿qué atributos importantes contiene el objeto?", "options": [{"text": "a. No tiene atributos; solo métodos fit() y predict() que deben llamarse cada vez", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Después de fit(), el modelo almacena labels_, cluster_centers_, inertia_ y más atributos."}, {"text": "b. labels_: etiqueta de cluster para cada punto; cluster_centers_: coordenadas de centroides; inertia_: WCSS final", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. feature_importances_: importancia de cada característica; classes_: clases predichas", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. probability_matrix_: matriz de probabilidades de pertenecer a cada cluster", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Después defit(), el modelo K-Means tiene atributos clave: (1)labels_: Array de etiquetas que asigna cada punto a un cluster (0 a K-1). (2)cluster_centers_: Coordenadas de los K centroides (matriz de forma K × n_features). (3)inertia_: WCSS final del clustering. (4)n_iter_: Número de iteraciones hasta convergencia. El métodopredict()permite asignar nuevos datos a clusters sin reentrenar.", "rightAnswer": "A resposta correcta é: labels_: etiqueta de cluster para cada punto; cluster_centers_: coordenadas de centroides; inertia_: WCSS final", "hasCorrectMarked": true}, {"num": 76, "status": "incorrect", "question": "¿Cuál es la principal desventaja práctica de utilizar la validación cruzada (k-fold Cross-Validation) en comparación con una simple división (hold-out) de entrenamiento-test?", "options": [{"text": "a. El coste computacional se incrementa proporcionalmente al número de folds.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Requiere obligatoriamente muchos más datos que una división simple.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. De hecho, CV es ideal para datasets pequeños porque aprovecha cada observación tanto para training como para validación en algún momento."}, {"text": "c. Se pierde la posibilidad de evaluar el rendimiento final en datos no vistos.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Es metodológicamente más difícil ajustar los hiperparámetros.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "La validación cruzada implica entrenar y evaluar el modelokveces (una por cada pliegue/fold). Esto multiplica el coste computacional por un factor dek, lo cual puede ser prohibitivo en modelos profundos o datasets grandes.", "rightAnswer": "A resposta correcta é: El coste computacional se incrementa proporcionalmente al número de folds.", "hasCorrectMarked": true}, {"num": 77, "status": "correct", "question": "¿Cómo se puede detectar que un modelo está haciendo overfitting?", "options": [{"text": "a. Contando el número de parámetros del modelo: más parámetros = overfitting", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Si el modelo predice siempre el mismo valor, está haciendo overfitting", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Comparando error train vs test: si error_train es mucho menor que error_test, hay overfitting", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. La gran diferencia entre rendimiento en train y test es el indicador clave."}, {"text": "d. Observando solo el error en entrenamiento: si es bajo, el modelo es bueno", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El overfitting se detecta comparando el rendimiento en train vs test:Si el error en train es bajo pero el error en test es significativamente mayor, hay overfitting. Por ejemplo, si MAE en train es 1000 pero MAE en test es 25000, el modelo memorizó los datos de entrenamiento. También se puede detectar con curvas de aprendizaje: si el error de train sigue bajando pero el de validación sube o se estanca, hay overfitting. La clave essiempre evaluar con datos no vistos.", "rightAnswer": "A resposta correcta é: Comparando error train vs test: si error_train es mucho menor que error_test, hay overfitting", "hasCorrectMarked": true}, {"num": 78, "status": "incorrect", "question": "La Regresión Lineal se define como una tarea de aprendizaje supervisado donde la salida objetivo es...", "options": [{"text": "a. Un valor numérico continuo (ej. precio, temperatura).", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Un conjunto de parámetros ajustado.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Una lista ordenada de elementos.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Una distribución de probabilidad entre 0 y 1.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto (aunque la regresión logística da probabilidades, es un clasificador)."}], "feedback": "La distinción clave entre regresión y clasificación es el tipo de salida. Regresión predice un valor numéricocontinuo(infinitos valores posibles dentro de un rango, con orden y magnitud), mientras que clasificación predice etiquetas categóricas discretas.", "rightAnswer": "A resposta correcta é: Un valor numérico continuo (ej. precio, temperatura).", "hasCorrectMarked": true}, {"num": 79, "status": "notanswered", "question": "Se tiene un conjunto de datos médicos (edad, IMC, presión, glucosa, etc.) y un indicador numérico que señala la progresión de la diabetes un año después. ¿Qué tipo de problema de aprendizaje automático es el adecuado para predecir este indicador?", "options": [{"text": "a. Clasificación binaria", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Aprendizaje reforzado", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Reducción de dimensionalidad.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Regresión Supervisada.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Dado que la variable objetivo (target) es un valor numérico continuo (un score de progresión), y no una categoría discreta, el problema se modela correctamente como unaRegresión.", "rightAnswer": "A resposta correcta é: Regresión Supervisada.", "hasCorrectMarked": true}, {"num": 80, "status": "notanswered", "question": "¿Cuál es el objetivo principal del clustering?", "options": [{"text": "a. Utiliza refuerzo positivo y negativo para aprender la estructura de los datos", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Predice valores numéricos continuos a partir de características de entrada sin supervisión humana.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Clasifica datos en categorías predefinidas sin necesidad de entrenamiento previo.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Agrupa registros en grupos de características similares, descubriendo estructura inherente.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Clusteringes una técnica deaprendizaje no supervisadoporque opera sobre datossin etiquetas(no hay variable objetivo conocida). Su propósito esagrupar registros en grupos de características similares, llamadosclusters. Los puntos dentro de un cluster son más similares entre sí que con puntos de otros clusters. No hay \"respuesta correcta\" predefinida; el algoritmo descubre la estructura inherente en los datos.", "rightAnswer": "A resposta correcta é:Agrupa registros en grupos de características similares, descubriendo estructura inherente.", "hasCorrectMarked": true}, {"num": 81, "status": "notanswered", "question": "En la estrategia Epsilon-Greedy , ¿qué ocurre cuando el agente decide \"explorar\" (con probabilidad epsilon)?", "options": [{"text": "a. Elige una acción aleatoria para descubrir nuevas posibilidades.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. El agente se detiene para procesar lo aprendido.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. El agente reinicia el episodio.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Elige siempre la acción con el valor Q más alto.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Explorar significa elegir una acciónaleatoriaen lugar de la que el agente cree que es la mejor (según la Q-Table actual). Esto permite descubrir nuevas rutas o estrategias que podrían ser mejores que las conocidas, evitando óptimos locales.", "rightAnswer": "A resposta correcta é:Elige una acción aleatoria para descubrir nuevas posibilidades.", "hasCorrectMarked": true}, {"num": 82, "status": "notanswered", "question": "Un histograma de la hormona muestra sesgo derecho extremo : la gran mayoría de valores se concentran cerca de cero, pero hay una \"cola\" larga que se extiende hasta valores de 500+. ¿Qué tratamiento podría ser apropiado para esta variable?", "options": [{"text": "a. Eliminar los valores extremos por encima del quinto cuartil.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Quedarse con los valores dentro del IQR (la diferencia entre el primer y el quinto cuartil) para evitar outliers.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Transformación logarítmica para comprimir valores altos y hacer la distribución más simétrica", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Aplicar estandarización (StandardScaler) que automáticamente corrige el sesgo", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Una distribución consesgo derecho extremo(la mayoría de valores cerca de cero con cola larga hacia valores altos) típicamente se beneficia de unatransformación logarítmica. El logaritmo \"comprime\" los valores grandes y \"expande\" los pequeños, estabilizando la varianza y haciendo la distribución más simétrica. Esto es especialmente importante para modelos lineales que asumen normalidad o varianza constante. Sin embargo, hay que tener cuidado con valores cero (log(0) no está definido; se puede usar log(x+1)).", "rightAnswer": "A resposta correcta é:Transformación logarítmica para comprimir valores altos y hacer la distribución más simétrica", "hasCorrectMarked": true}, {"num": 83, "status": "incorrect", "question": "¿Cuál es la principal limitación de los árboles de decisión individuales que Random Forest busca superar?", "options": [{"text": "a. El sobreajuste (overfitting) y la alta varianza", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. La incapacidad para manejar variables categóricas", "correct": false, "selected": true, "selected_wrong": true, "feedback": ""}, {"text": "c. El alto costo computacional durante el entrenamiento", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. La lentitud en el tiempo de predicción", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "", "rightAnswer": "A resposta correcta é: El sobreajuste (overfitting) y la alta varianza", "hasCorrectMarked": true}, {"num": 84, "status": "notanswered", "question": "¿En qué consiste el muestreo estratificado (stratified sampling) al dividir un dataset?", "options": [{"text": "a. Garantizar que todas las clases están balanceadas.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Garantizar que la proporción de ejemplos de cada estrato se mantenga constante en los conjuntos de entrenamiento y test.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Dividir el dataset garantizando aleatoriedad para que la distribución del muestreo sea la misma que la de la población.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Dividir los datos cronológicamente para respetar la serie temporal.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El muestreo estratificado divide la población en subgrupos homogéneos (estratos) y toma muestras de cada uno para asegurar que el conjunto final (training o test) sea representativo de la población global, manteniendo las proporciones originales de las clases (especialmente importante si están desbalanceadas).", "rightAnswer": "A resposta correcta é:Garantizar que la proporción de ejemplos de cada estrato se mantenga constante en los conjuntos de entrenamiento y test.", "hasCorrectMarked": true}, {"num": 85, "status": "correct", "question": "El learning rate (α) es un hiperparámetro crucial en Q-Learning. ¿Cuál es el efecto del learning rate en el proceso de aprendizaje?", "options": [{"text": "a. Controla la probabilidad de exploración; α alto significa más exploración aleatoria y menos explotación del conocimiento.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Define el número de episodios necesarios para convergencia; α más alto requiere menos episodios.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Determina cuántos pasos hacia el futuro se consideran para calcular la recompensa acumulada.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Controla el peso de nueva información vs conocimiento existente; α alto = aprendizaje rápido pero inestable; α bajo = aprendizaje lento pero estable.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. El learning rate balancea entre adaptarse rápidamente a nueva información y mantener estabilidad con lo ya aprendido."}], "feedback": "Ellearning rate (α)controla cuánto peso damos a la nueva información vs. el conocimiento existente. Está típicamente en el rango [0, 1].α alto(cercano a 1): aprendizaje rápido pero inestable, puede olvidar lo aprendido.α bajo(cercano a 0): aprendizaje lento pero estable, requiere más exploraciones. Valores típicos: 0.1-0.5. Un α=1 reemplaza completamente el valor antiguo; α=0 no aprende nada nuevo.", "rightAnswer": "A resposta correcta é:Controla el peso de nueva información vs conocimiento existente; α alto = aprendizaje rápido pero inestable; α bajo = aprendizaje lento pero estable.", "hasCorrectMarked": true}, {"num": 86, "status": "correct", "question": "¿En qué consiste la técnica de imputación durante el preprocesamiento de datos?", "options": [{"text": "a. Rellenar los valores faltantes con un valor estimado.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Permite conservar el resto de información de la fila."}, {"text": "b. Utilizar modelos que permiten el tratamiento de valores faltantes al asignarle un valor especial, como los árboles de decisión.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Cambiar todos los valores faltantes siempre por ceros después de haber escalado.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Identificar los valores nulos o desconocidos asignando NaN para que los arrays de numPy puedan procesarlos.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "La imputación es el proceso de rellenar los valores faltantes (missing values/NaNs) con estimaciones razonables (como la media, mediana, moda o un valor constante) para evitar errores en los algoritmos que no admiten datos incompletos.", "rightAnswer": "A resposta correcta é:Rellenar los valores faltantes con un valor estimado.", "hasCorrectMarked": true}, {"num": 87, "status": "correct", "question": "En un sistema de detección de fraude bancario, ¿cuál es la consecuencia práctica negativa de priorizar exageradamente la exhaustividad (high recall)?", "options": [{"text": "a. Que se bloquearán muchas transacciones legítimas por error (Falsos Positivos), causando molestias a los clientes.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto."}, {"text": "b. Que el sistema será incapaz de detectar fraudes nuevos en producción.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Que se escaparán muchos fraudes reales, causando pérdidas económicas directas (Falsos Negativos).", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Que se requerirán menos datos para entrenar.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Priorizar el Recall significa capturar todos los fraudes posibles. Al bajar el umbral de decisión para lograr esto, muchas transacciones legítimas se clasificarán incorrectamente como fraudulentas (Falsos Positivos). Esto causamolestias a los clientes(bloqueo de tarjetas) y costes operativos de revisión manual.", "rightAnswer": "A resposta correcta é: Que se bloquearán muchas transacciones legítimas por error (Falsos Positivos), causando molestias a los clientes.", "hasCorrectMarked": true}, {"num": 88, "status": "correct", "question": "¿Qué característica fundamental distingue a los arrays de NumPy de las listas estándar de Python?", "options": [{"text": "a. Son más lentos pero más robustos que las listas al estar programados en C.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Pueden contener diferentes tipos de datos mezclados en el mismo array.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Siempre tienen una estructura de dos dimensiones sin forzar mientras que las listas requieren ser anidadas, lo que limita el control de la estructura.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Son homogéneos (mismo tipo de dato) y más eficientes en memoria y velocidad.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. La homogeneidad es clave para el rendimiento en C."}], "feedback": "Los arrays de NumPy sonhomogéneos(todos los elementos deben ser del mismo tipo de dato) y tienen un tamaño fijo en memoria tras su creación. Esto permite optimizaciones masivas de velocidad (vectorización) y uso de memoria en comparación con las listas de Python, que son heterogéneas y almacenan referencias a objetos.", "rightAnswer": "A resposta correcta é: Son homogéneos (mismo tipo de dato) y más eficientes en memoria y velocidad.", "hasCorrectMarked": true}, {"num": 89, "status": "notanswered", "question": "¿Cuándo ocurre el Sesgo de Muestreo (Sampling Bias) en la recolección de datos?", "options": [{"text": "a. Cuando el algoritmo de aprendizaje infravalora las clases minoritarias.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Cuando la muestra recolectada no es representativa de la población objetivo.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Cuando los datos no están normalizados.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Cuando existen valores nulos en el dataset.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Ocurre cuando la muestra recolectada no representa fielmente la distribución real de la población objetivo, generalmente porque ciertos grupos tienen menor probabilidad de ser seleccionados. Esto invalida las predicciones en el mundo real.", "rightAnswer": "A resposta correcta é:Cuando la muestra recolectada no es representativa de la población objetivo.", "hasCorrectMarked": true}, {"num": 90, "status": "incorrect", "question": "En el contexto del algoritmo Minimax para juegos de suma cero como el Tres en Raya (Tic-Tac-Toe), ¿qué hace que el algoritmo sea \"pesimista\" sobre la estrategia del oponente?", "options": [{"text": "a. Asume que el oponente intenta maximizar la puntuación del jugador.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Asume que el oponente tiene información oculta.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Asume que el oponente juega de manera óptima para minimizar la puntuación del jugado.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Asume que el oponente juega aleatoriamente.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Eso simplificaría el problema (oponente débil), pero Minimax es cauteloso."}], "feedback": "Minimax asume un escenario del \"peor caso\": supone que el oponente es racional y siempre ejecutará el movimiento óptimo posible para minimizar tu puntuación (que es lo mismo que maximizar la suya en un juego de suma cero). Si el oponente juega mal, Minimax sigue funcionando, pero su estrategia base es defenderse contra un oponente perfecto.", "rightAnswer": "A resposta correcta é:Asume que el oponente juega de manera óptima para minimizar la puntuación del jugado.", "hasCorrectMarked": true}, {"num": 91, "status": "correct", "question": "En el contexto de Q-Learning Tabular para Tres en Raya, ¿qué es exactamente lo que el agente \"aprende\"?", "options": [{"text": "a. Las reglas explícitas del juego (3 en raya es victoria).", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. La sintaxis de Python para el juego, aunque esto no refleja correctamente el comportamiento esperado.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Una tabla de valores que representan la recompensa futura esperada por tomar una acción específica en un estado de tablero específico.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Función Q(s,a)."}, {"text": "d. Un árbol de decisión similar a Minimax.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El agente aprende unaQ-Table(tabla de calidad), que es un mapa que asocia cada par posible de (Estado, Acción) con un valor numérico. Este valor representa la recompensa futura acumulada esperada (utilidad) de tomar esa acción en ese estado específico.", "rightAnswer": "A resposta correcta é: Una tabla de valores que representan la recompensa futura esperada por tomar una acción específica en un estado de tablero específico.", "hasCorrectMarked": true}, {"num": 92, "status": "correct", "question": "¿Cuál de estos algoritmos tiene un coste computacional bajo en entrenamiento pero potencialmente alto en predicción ?", "options": [{"text": "a. K-Means", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. SVM (Support Vector Machines)", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. KNN (K-Nearest Neighbors)", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Al no aprender parámetros, traslada toda la carga computacional al momento de inferencia."}, {"text": "d. Árboles de Decisión", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "KNN es un algoritmo \"perezoso\" (lazy). No construye un modelo explícito durante el entrenamiento (coste casi nulo), pero en predicción debe calcular distancias contra todos los puntos almacenados (coste alto).", "rightAnswer": "A resposta correcta é: KNN (K-Nearest Neighbors)", "hasCorrectMarked": true}, {"num": 93, "status": "correct", "question": "Una aerolínea tiene datos de vuelos con horas de salida y llegada (programadas y reales) y quiere predecir si un vuelo llegará con retraso. No tienen un campo explícito de \"retrasado sí/no\" . ¿Cuál es el enfoque metodológico correcto?", "options": [{"text": "a. Aprendizaje no supervisado con detección de anomalías, ya que los retrasos son eventos anómalos en el tráfico aéreo", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Crear una variable sintética de retraso (diferencia entre hora real y programada), preferiblemente modelándola como regresión para predecir minutos de retraso", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Derivamos la etiqueta de datos existentes; regresión preserva más información que clasificación binaria."}, {"text": "c. Clasificación binaria directa usando la hora de llegada como variable objetivo en lugar de crear una etiqueta derivada", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Usar clustering para agrupar vuelos con patrones temporales similares e identificar los grupos que corresponden a retrasos", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Aunque no hay etiqueta explícita, podemos crearla como variable sintética comparando hora real vs programada. Mejor aún: predecir minutos de retraso (regresión) y umbralizar después.", "rightAnswer": "A resposta correcta é: Crear una variable sintética de retraso (diferencia entre hora real y programada), preferiblemente modelándola como regresión para predecir minutos de retraso", "hasCorrectMarked": true}, {"num": 94, "status": "incorrect", "question": "En scikit-learn, el parámetro n_init de K-Means especifica cuántas veces se ejecutará el algoritmo. ¿Por qué es útil este parámetro?", "options": [{"text": "a. Ejecuta K-Means n_init veces con diferentes inicializaciones; devuelve el mejor resultado para evitar óptimos locales", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Limita el número máximo de iteraciones por ejecución del algoritmo", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Ese es max_iter, no n_init. n_init es número de ejecuciones completas."}, {"text": "c. Define el número de clusters a probar en búsqueda del K óptimo", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Especifica el número de muestras a usar para estimar los centroides iniciales", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "n_initespecifica el número de veces que se ejecuta K-Means condiferentes centroides iniciales. El resultado final es elmejor de todas las ejecucionesen términos de inercia. Esto es útil porque K-Means puede encontrar óptimos locales dependiendo de la inicialización; ejecutar múltiples veces aumenta la probabilidad de encontrar un buen clustering. El valor por defecto era 10, ahora 'auto' ajusta automáticamente. Más ejecuciones = mejor resultado pero mayor tiempo de cómputo.", "rightAnswer": "A resposta correcta é: Ejecuta K-Means n_init veces con diferentes inicializaciones; devuelve el mejor resultado para evitar óptimos locales", "hasCorrectMarked": true}, {"num": 95, "status": "new", "question": "¿Cuál es el principal problema del gradiente que dificulta el entrenamiento de redes neuronales muy profundas?", "options": [{"text": "a. El gradiente explota siempre en la última capa, haciendo divergir el modelo", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. El gradiente se desvanece (vanishing gradient): las capas iniciales reciben gradientes casi cero y aprenden muy lento", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. El gradiente se vuelve negativo en capas con ReLU, bloqueando el aprendizaje", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. El gradiente converge demasiado rápido antes de que el modelo generalice", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El vanishing gradient ocurre porque al aplicar la regla de la cadena capa a capa, los gradientes se multiplican por valores pequeños. Soluciones: ReLU, LSTM, skip connections (ResNet), Batch Normalization.", "hasCorrectMarked": true, "rightAnswer": ""}, {"num": 96, "status": "new", "question": "¿Qué ocurre exactamente en la fase de Backpropagation durante el entrenamiento de una red neuronal?", "options": [{"text": "a. Se evalúa el modelo sobre el conjunto de validación para medir su rendimiento", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Se calculan los gradientes de la función de pérdida respecto a cada parámetro usando la regla de la cadena, propagando el error desde la salida hacia la entrada", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Se actualizan los pesos del modelo sumando directamente el error de cada muestra", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Se aplica la función de activación a cada neurona para calcular la salida de la red", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Backpropagation usa la regla de la cadena para computar dL/dw para cada peso. Forward pass: calcula predicciones y pérdida. Backward pass: propaga gradientes de output a input. Los gradientes indican cuánto y en qué dirección cambiar cada peso.", "hasCorrectMarked": true, "rightAnswer": ""}, {"num": 97, "status": "new", "question": "¿Por qué ReLU es la función de activación más usada en capas ocultas de redes neuronales profundas?", "options": [{"text": "a. Porque produce outputs entre 0 y 1, lo que facilita la interpretación como probabilidad", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Porque su gradiente es 1 para entradas positivas, mitigando el vanishing gradient, y es computacionalmente muy eficiente", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Porque garantiza que la red converja al mínimo global de la función de pérdida", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Porque normaliza automáticamente las activaciones entre -1 y 1 en cada capa", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "ReLU(x)=max(0,x). Para x>0 su derivada es exactamente 1, lo que alivia el vanishing gradient. Además es O(1) en cómputo. Desventaja: neuronas muertas cuando x<0 siempre. Variantes: Leaky ReLU, ELU.", "hasCorrectMarked": true, "rightAnswer": ""}, {"num": 98, "status": "new", "question": "¿Cuál es la diferencia clave entre el optimizador SGD y Adam?", "options": [{"text": "a. SGD usa todos los datos para cada actualización; Adam usa mini-batches", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Adam adapta el learning rate para cada parámetro individualmente usando momentos de primer y segundo orden, mientras SGD usa el mismo learning rate para todos", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. SGD siempre converge más rápido que Adam en tareas de visión por computador", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Adam no necesita definir un learning rate inicial mientras que SGD sí", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Adam mantiene medias móviles del gradiente (m) y del gradiente al cuadrado (v), adaptando el lr por parámetro. Converge más rápido que SGD en la mayoría de casos y es el default recomendado.", "hasCorrectMarked": true, "rightAnswer": ""}, {"num": 99, "status": "new", "question": "¿Qué hace Dropout durante el entrenamiento de una red neuronal y por qué mejora la generalización?", "options": [{"text": "a. Elimina las neuronas con pesos más pequeños para reducir el tamaño del modelo permanentemente", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Desactiva aleatoriamente un porcentaje de neuronas en cada paso, forzando a la red a no depender de ninguna neurona específica y reduciendo la co-adaptación", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Reduce el learning rate a la mitad cada vez que detecta overfitting en el conjunto de validación", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Añade ruido gaussiano a los pesos durante backpropagation para explorar el espacio de soluciones", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Dropout apaga neuronas con probabilidad p en cada forward pass durante training. Actúa como ensemble implícito de muchas sub-redes. En inferencia se desactiva y los pesos se escalan. Típicamente p=0.2-0.5.", "hasCorrectMarked": true, "rightAnswer": ""}, {"num": 100, "status": "new", "question": "Para una tarea de clasificación multiclase con 10 clases, ¿qué combinación de activación en la capa de salida y función de pérdida es la correcta?", "options": [{"text": "a. Sigmoid + Binary Cross-Entropy", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. ReLU + MSE", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Softmax + Cross-Entropy (Categorical Cross-Entropy)", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Tanh + MAE", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Softmax convierte los logits en probabilidades que suman 1 (una por clase). Cross-Entropy penaliza asignar baja probabilidad a la clase correcta: L=-log(p_correcta). Esta combinación es el estándar para clasificación multiclase.", "hasCorrectMarked": true, "rightAnswer": ""}, {"num": 101, "status": "new", "question": "¿Qué ocurre cuando el learning rate es demasiado alto en el entrenamiento de una red neuronal?", "options": [{"text": "a. El modelo aprende muy lentamente porque los pasos de actualización son pequeños", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. El modelo salta sobre los mínimos y la función de pérdida oscila o diverge en lugar de converger", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. El modelo hace overfitting más rápidamente al memorizar los datos de entrenamiento", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. El gradiente se desvanece porque los pesos crecen demasiado rápido", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Con lr alto, los pasos de actualización son tan grandes que el modelo salta de un lado a otro del mínimo, sin converger o incluso divergiendo. Learning rate scheduling (reducir lr gradualmente) suele dar mejores resultados.", "hasCorrectMarked": true, "rightAnswer": ""}, {"num": 102, "status": "new", "question": "¿Cuál es el papel de las funciones de activación no lineales en una red neuronal MLP?", "options": [{"text": "a. Normalizar los outputs de cada capa para que estén entre 0 y 1 y facilitar el entrenamiento", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Sin ellas, el MLP sería equivalente a una única transformación lineal sin importar cuántas capas tenga, incapaz de aprender relaciones no lineales", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Reducir el número de parámetros del modelo para evitar overfitting", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Calcular los gradientes de forma más eficiente durante backpropagation", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "La composición de transformaciones lineales sigue siendo lineal. Las activaciones no lineales rompen esta linealidad, permitiendo al MLP aproximar cualquier función continua (Universal Approximation Theorem).", "hasCorrectMarked": true, "rightAnswer": ""}, {"num": 103, "status": "new", "question": "¿Qué diferencia hay entre overfitting en ML clásico y en redes neuronales profundas?", "options": [{"text": "a. Las redes neuronales no pueden hacer overfitting porque tienen demasiados parámetros para memorizar datos", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. En ambos casos el modelo memoriza datos de entrenamiento y falla en generalizar, pero en redes profundas es más fácil dado el altísimo número de parámetros", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Las redes neuronales solo hacen overfitting en clasificación, nunca en regresión", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. El overfitting en redes profundas siempre se detecta porque el training loss sube rápidamente", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Una red profunda puede tener millones de parámetros, dándole capacidad para memorizar datasets. Señales: training loss bajo pero validation loss alto (gap creciente). Soluciones: Dropout, L2 regularization, Early stopping, más datos.", "hasCorrectMarked": true, "rightAnswer": ""}, {"num": 104, "status": "new", "question": "¿Qué es Batch Normalization y cuál es su principal beneficio en redes profundas?", "options": [{"text": "a. Divide el dataset en mini-batches de igual tamaño para acelerar el entrenamiento por GPU", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Normaliza las activaciones de cada capa dentro de cada mini-batch, estabilizando el entrenamiento y permitiendo usar learning rates más altos", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Aplica dropout a los batches de datos de entrada antes de pasarlos a la primera capa", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Normaliza los pesos de la red al final de cada época para prevenir el exploding gradient", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Batch Norm normaliza las activaciones usando media y varianza del mini-batch, luego escala/desplaza con parámetros aprendibles. Reduce Internal Covariate Shift, permite lr más altos, actúa como regularizador.", "hasCorrectMarked": true, "rightAnswer": ""}, {"num": 105, "status": "new", "question": "En PyTorch, ¿qué función cumple `model.eval()` y por qué es importante usarlo en inferencia?", "options": [{"text": "a. Evalúa el modelo en el conjunto de test y devuelve las métricas de rendimiento automáticamente", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Pone el modelo en modo inferencia: desactiva Dropout y fija los parámetros de Batch Normalization para predicciones deterministas y consistentes", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Guarda los pesos del modelo entrenado en disco para usarlos más tarde", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Congela los gradientes de todas las capas para que no se actualicen durante la evaluación", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "model.eval() cambia el comportamiento de Dropout (no elimina neuronas) y BatchNorm (usa estadísticas globales). Es esencial antes de cualquier inferencia o evaluación para resultados correctos.", "hasCorrectMarked": true, "rightAnswer": ""}, {"num": 106, "status": "new", "question": "¿Cuál es la función de pérdida correcta para una tarea de regresión en una red ne
