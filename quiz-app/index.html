<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Repaso Examen IA25</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f1117;--surface:#1a1d27;--surface2:#222536;--border:#2e3350;
      --text:#e8eaf6;--muted:#8b90b0;--accent:#6c63ff;--accent-dim:#3d3880;
      --ok:#22c55e;--ok-bg:#052e16;--err:#ef4444;--err-bg:#2d0a0a;
      --warn:#f59e0b;--warn-bg:#2d1b00;
    }
    body{background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif;font-size:16px;line-height:1.6;min-height:100vh}
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
    header h1{font-size:1rem;font-weight:700;color:var(--accent);flex:1;min-width:120px}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    select,button{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 11px;border-radius:7px;font-size:0.8rem;cursor:pointer;transition:border-color .15s}
    select:hover,button:hover{border-color:var(--accent)}
    button.primary{background:var(--accent);border-color:var(--accent);font-weight:600}
    button.primary:hover{background:#7c75ff}
    button:disabled{opacity:.35;cursor:not-allowed}
    label.toggle{display:flex;align-items:center;gap:5px;font-size:0.8rem;color:var(--muted);cursor:pointer;white-space:nowrap}
    label.toggle input{accent-color:var(--accent);cursor:pointer}
    .row-setting{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .row-setting label{font-size:0.8rem;color:var(--muted)}
    input[type=number]{width:64px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:7px;font-size:0.8rem}
    .progress-wrap{width:100%;height:4px;background:var(--border)}
    .progress-fill{height:100%;background:var(--accent);transition:width .3s}
    main{max-width:900px;margin:0 auto;padding:24px 16px 80px;display:grid;grid-template-columns:1fr 220px;gap:20px}
    @media(max-width:800px){main{grid-template-columns:1fr;gap:12px}}
    .quiz-main{min-width:0}
    .sidebar{display:flex;flex-direction:column;gap:16px}
    .stats{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .chip{padding:4px 11px;border-radius:18px;font-size:.75rem;font-weight:600;border:1px solid}
    .chip.total{background:var(--surface2);border-color:var(--border);color:var(--muted)}
    .chip.answered{background:rgba(108,99,255,.12);border-color:var(--accent);color:var(--accent)}
    .chip.ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
    .chip.err{background:var(--err-bg);border-color:var(--err);color:var(--err)}
    .dot-wrap{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px;display:flex;flex-direction:column;gap:8px}
    .toggle-dots-btn{font-size:.73rem;color:var(--muted);background:none;border:none;cursor:pointer;padding:0}
    .toggle-dots-btn:hover{color:var(--text)}
    .dot-nav{display:flex;flex-wrap:wrap;gap:4px;max-height:300px;overflow-y:auto}
    .dot-nav span{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;cursor:pointer;background:var(--surface2);color:var(--muted);transition:all .12s;flex-shrink:0}
    .dot-nav span:hover{border-color:var(--accent)}
    .dot-nav span.dn-answered{background:rgba(108,99,255,.12);border-color:var(--accent);color:var(--accent)}
    .dot-nav span.dn-ok{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
    .dot-nav span.dn-err{background:var(--err-bg);border-color:var(--err);color:var(--err)}
    .dot-nav span.dn-cur{outline:2px solid var(--accent);outline-offset:1px;font-weight:700}
    .q-mem{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px;font-size:.78rem}
    .q-mem-title{font-weight:700;margin-bottom:6px;color:var(--accent)}
    .q-mem-row{display:flex;justify-content:space-between;color:var(--muted);margin:3px 0}
    .q-mem-row strong{color:var(--text)}
    .qcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;animation:fi .18s ease}
    @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .qmeta{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
    .qnum{background:var(--accent-dim);color:var(--accent);font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:9px}
    .qbadge{font-size:.72rem;padding:2px 9px;border-radius:9px;font-weight:600}
    .b-ok{background:var(--ok-bg);color:var(--ok)}
    .b-err{background:var(--err-bg);color:var(--err)}
    .b-warn{background:var(--warn-bg);color:var(--warn)}
    .b-new{background:var(--accent-dim);color:var(--accent)}
    .qtext{font-size:.98rem;font-weight:500;margin-bottom:18px;line-height:1.7}
    .options{display:flex;flex-direction:column;gap:8px}
    .option{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:2px solid var(--border);border-radius:11px;cursor:pointer;transition:border-color .12s,background .12s;user-select:none}
    .option:hover:not(.disabled){border-color:var(--accent);background:rgba(108,99,255,.07)}
    .option.disabled{cursor:default}
    .option .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;transition:all .12s}
    .option.selected .dot{border-color:var(--accent);background:var(--accent)}
    .option.selected .dot::after{content:"";width:6px;height:6px;background:#fff;border-radius:50%}
    .opt-text{font-size:.9rem;line-height:1.5;flex:1}
    .opt-icon{margin-left:auto;font-size:.95rem;flex-shrink:0;margin-top:2px}
    .option.show-ok{border-color:var(--ok);background:var(--ok-bg)}
    .option.show-err{border-color:var(--err);background:var(--err-bg)}
    .feedback{margin-top:16px;padding:14px;border-radius:11px;font-size:.86rem;line-height:1.6}
    .feedback.fb-ok{background:var(--ok-bg);border:1px solid var(--ok);color:#86efac}
    .feedback.fb-err{background:var(--err-bg);border:1px solid var(--err);color:#fca5a5}
    .feedback.fb-info{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
    .feedback .fb-title{font-weight:700;margin-bottom:5px}
    .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px}
    .nav-row button{padding:9px 18px;font-size:.86rem;border-radius:9px}
    .end-screen{text-align:center;padding:40px 16px 24px}
    .score-big{font-size:3rem;font-weight:800;color:var(--accent);margin-bottom:6px}
    .score-adj{font-size:1.1rem;color:var(--warn);margin-bottom:4px}
    .end-screen h2{font-size:1.6rem;margin-bottom:8px}
    .end-screen p{color:var(--muted);margin-bottom:20px}
    .btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .review-list{display:flex;flex-direction:column;gap:18px;margin-top:4px}
    .ri{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:20px}
    .ri.ri-ok{border-color:var(--ok)}
    .ri.ri-err{border-color:var(--err)}
    .ri.ri-skip{border-color:var(--warn)}
    @media(max-width:600px){main{padding:14px 10px 60px}.qcard{padding:16px 12px}}

    /* === ESTADÍSTICAS === */
    .stats-screen{padding:8px 0 40px}
    .stats-screen h2{font-size:1.3rem;font-weight:800;margin-bottom:4px;color:var(--accent)}
    .stats-screen p{color:var(--muted);font-size:.85rem;margin-bottom:20px}
    .stats-summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px 18px;flex:1;min-width:110px;text-align:center}
    .stat-card .sc-val{font-size:1.6rem;font-weight:800;line-height:1.1}
    .stat-card .sc-lbl{font-size:.72rem;color:var(--muted);margin-top:3px}
    .stat-card.sc-ok .sc-val{color:var(--ok)}
    .stat-card.sc-err .sc-val{color:var(--err)}
    .stat-card.sc-warn .sc-val{color:var(--warn)}
    .stat-card.sc-acc .sc-val{color:var(--accent)}
    .stats-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .stats-table th{background:var(--surface2);color:var(--muted);padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)}
    .stats-table th:nth-child(3),.stats-table th:nth-child(4),.stats-table th:nth-child(5),.stats-table th:nth-child(6){text-align:center}
    .stats-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
    .stats-table td:nth-child(3),.stats-table td:nth-child(4),.stats-table td:nth-child(5),.stats-table td:nth-child(6){text-align:center}
    .stats-table tr:hover{background:var(--surface2)}
    .fail-rate{font-weight:700;padding:2px 7px;border-radius:6px;font-size:.75rem}
    .fail-high{background:var(--err-bg);color:var(--err)}
    .fail-mid{background:var(--warn-bg);color:var(--warn)}
    .fail-low{background:var(--ok-bg);color:var(--ok)}
    .stats-empty{text-align:center;padding:40px;color:var(--muted)}
    .stats-row-btn{font-size:.72rem;padding:3px 8px;border-radius:6px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
    .stats-row-btn:hover{border-color:var(--accent);color:var(--accent)}
    .stats-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
    .stats-filters label{font-size:.8rem;color:var(--muted)}
    .mini-bar{display:inline-flex;height:6px;border-radius:3px;overflow:hidden;width:60px;background:var(--border);vertical-align:middle;margin-left:4px}
    .mini-bar-ok{background:var(--ok);height:100%}
    .stats-table tr.q-row{cursor:pointer}
    .stats-table tr.q-row:hover td{background:rgba(108,99,255,.08)}
    .stats-table tr.q-row td:nth-child(2)::after{content:" ▸";color:var(--muted);font-size:.7rem}
    .stats-table tr.q-row.open td:nth-child(2)::after{content:" ▾"}
    .stats-detail-row td{padding:0 !important;border-bottom:2px solid var(--accent)!important;background:var(--surface2)!important}
    .stats-detail-inner{padding:16px 14px;display:flex;flex-direction:column;gap:10px}
    .stats-q-full{font-size:.88rem;font-weight:600;line-height:1.6;color:var(--text);margin-bottom:4px}
    .stats-opt{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:.83rem;line-height:1.5}
    .stats-opt.s-ok{border-color:var(--ok);background:var(--ok-bg);color:#86efac}
    .stats-opt .s-dot{width:14px;height:14px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;margin-top:3px}
    .stats-opt.s-ok .s-dot{background:var(--ok)}
    .stats-feedback{font-size:.8rem;color:#86efac;background:var(--ok-bg);border:1px solid var(--ok);border-radius:8px;padding:10px 12px;line-height:1.6}
  </style>
</head>
<body>
<header>
  <h1>🧠 Repaso IA25</h1>
  <div class="controls">
    <select id="filterMode">
      <option value="all">Todas (150)</option>
      <option value="new">Nuevas U6-10 (56)</option>
      <option value="original">Originales examen (94)</option>
      <option value="incorrect">Falladas examen (30)</option>
      <option value="notanswered">Sin responder examen (28)</option>
      <option value="weak">Con más fallos (memoria)</option>
    </select>
    <div class="row-setting">
      <label>N.º preguntas:</label>
      <input type="number" id="numQ" value="20" min="5" max="150" step="5"/>
    </div>
    <button onclick="toggleShuffle()" id="shuffleBtn">🔀 Barajar</button>
    <label class="toggle" title="Ver resultado tras cada pregunta">
      <input type="checkbox" id="immediateMode" onchange="init()"/>
      Comprobar al momento
    </label>
    <button class="primary" onclick="restartQuiz()">↺ Reiniciar</button>
    <button onclick="copyQuestion()" title="Copiar pregunta para enviar a la IA">📋 Copiar pregunta</button>
    <button onclick="showStats()" title="Ver estadísticas de preguntas más falladas">📊 Estadísticas</button>
    <button onclick="clearStats()" title="Limpiar todas las estadísticas guardadas">🗑️ Limpiar estadísticas</button>
  </div>
</header>
<div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<main>
  <div class="quiz-main">
    <div class="stats" id="statsBar"></div>
    <div id="quizArea"></div>
  </div>
  <div class="sidebar">
    <div class="dot-wrap">
      <button class="toggle-dots-btn" id="toggleDotsBtn" onclick="toggleDots()">▾ Mapa de preguntas</button>
      <div class="dot-nav" id="dotNav" style="display:none"></div>
    </div>
    <div id="qMemoryWidget"></div>
  </div>
</main>

<script>
const ALL_QUESTIONS = [{"num": 1, "status": "correct", "question": "El entrenamiento de redes neuronales se basa en optimización. ¿Qué es Gradient Descent y cuál es su papel en el entrenamiento de redes neuronales?", "options": [{"text": "a. Método para calcular automáticamente los gradientes de funciones complejas usando la regla de la cadena", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Algoritmo de optimización que actualiza pesos en la dirección opuesta al gradiente de la pérdida, reduciendo iterativamente el error del modelo", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Gradient descent usa el gradiente de la función de pérdida para guiar los ajustes de pesos en la dirección que más reduce el error."}, {"text": "c. Técnica para encontrar el mínimo global de funciones de pérdida complejas garantizando convergencia óptima", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Técnica de regularización que añade ruido a los gradientes durante el entrenamiento para prevenir sobreajuste a los datos de entrenamiento", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Gradient Descentes el algoritmo de optimización fundamental utilizado para entrenar redes neuronales. Funciona así: (1) calcular la pérdida (diferencia entre predicción y valor real), (2) calcular los gradientes de la pérdida respecto a cada parámetro (peso), (3) actualizar los pesos en ladirección opuesta al gradientepara reducir la pérdida. Es como descender por una montaña usando la pendiente: cada paso va en la dirección de máximo descenso.", "rightAnswer": "A resposta correcta é: Algoritmo de optimización que actualiza pesos en la dirección opuesta al gradiente de la pérdida, reduciendo iterativamente el error del modelo", "hasCorrectMarked": true}, {"num": 2, "status": "incorrect", "question": "¿Cuál es la diferencia clave entre modelos paramétricos (como regresión lineal) y no paramétricos (como árboles de decisión) respecto al overfitting?", "options": [{"text": "a. Los modelos paramétricos requieren optimización de sus hiperparámetros para poder evitar el overfitting. Los no parametricos se adaptan directamente a la distribución de los datos.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Los no paramétricos tienen significativamente más riesgo de overfitting."}, {"text": "b. La diferencia está en la velocidad de entrenamiento, el overfitting depende de los otros hiperparámetros de entrenamiento.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Paramétricos son para clasificación; no paramétricos para regresión. Ambos pueden ser propensos a overfitting o no en función del proceso de optimización.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Los paramétricos tienen una estructura fija que los hace menos propensos a overfitting", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Modelos paramétricos(regresión lineal, logística): Tienen estructura fija con número predeterminado de parámetros. Asumen forma funcional específica (ej: línea recta). Sonmenos propensos a overfittingpero pueden no capturar relaciones complejas (pueden hacer underfitting).Modelos no paramétricos(árboles, KNN): No asumen estructura fija; adaptan su complejidad a los datos. Son más flexibles peromás propensos a overfittingporque pueden ajustarse demasiado a los datos de entrenamiento.", "rightAnswer": "A resposta correcta é:Los paramétricos tienen una estructura fija que los hace menos propensos a overfitting", "hasCorrectMarked": true}, {"num": 3, "status": "correct", "question": "¿Qué es un Perceptrón y qué limitación fundamental tiene el perceptrón simple?", "options": [{"text": "a. Es un tipo de función de activación como ReLU.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Es la neurona artificial básica; su limitación es que solo resuelve problemas linealmente separables.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. No puede aprender funciones como XOR."}, {"text": "c. Es una red neuronal profunda con múltiples capas ocultas.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Es un algoritmo de optimización para entrenar redes neuronales.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "ElPerceptrónes la unidad fundamental de una red neuronal, inspirada en el funcionamiento de una neurona biológica. Consiste en entradas ponderadas, una suma ponderada y una función de activación. Su limitación fundamental es que solo puede resolver problemaslinealmente separables(no puede aprender XOR, por ejemplo).", "rightAnswer": "A resposta correcta é: Es la neurona artificial básica; su limitación es que solo resuelve problemas linealmente separables.", "hasCorrectMarked": true}, {"num": 4, "status": "notanswered", "question": "Los coeficientes β de una regresión lineal son interpretables. Si el coeficiente de una feature \"edad\" es β=0.5 y el target es \"salario\", ¿cómo se interpreta este coeficiente?", "options": [{"text": "a. Por cada año adicional de edad, el salario predicho aumenta 0.5 unidades de la escala del target, manteniendo otras features constantes", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. La correlación entre edad y salario es exactamente 0.5", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. La edad explica el 50% de la varianza del salario; las otras features explican el otro 50%", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. La característica edad tiene la mitad de importancia que la característica más importante del modelo", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El coeficiente β=0.5 significa:por cada unidad de aumento en \"edad\" (1 año), el salario predicho aumenta 0.5 unidades(la unidad del target, ej: miles de euros), manteniendo todas las demás features constantes. Esta interpretación asume que la feature no ha sido transformada (si está estandarizada, la interpretación cambia). La magnitud del coeficiente solo indica importancia si las features están en la misma escala o estandarizadas.", "rightAnswer": "A resposta correcta é:Por cada año adicional de edad, el salario predicho aumenta 0.5 unidades de la escala del target, manteniendo otras features constantes", "hasCorrectMarked": true}, {"num": 5, "status": "correct", "question": "¿Qué característica fundamental distingue al Deep Learning (Aprendizaje Profundo) dentro del campo general del Machine Learning?", "options": [{"text": "a. Es cualquier algoritmo de ML que se ejecuta en una GPU.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Es sinónimo estrictamente de Aprendizaje No Supervisado.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Es un subcampo basado en redes neuronales multicapa que aprenden representaciones jerárquicas de los datos.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. La profundidad (capas) es la clave para la jerarquía de abstracciones."}, {"text": "d. Se caracteriza por el uso exclusivo de Árboles de Decisión muy profundos.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El Deep Learning se basa en redes neuronales artificiales con múltiples capas ocultas (arquitecturas profundas). Estas capas permiten aprender jerarquías de representaciones de datos, desde características simples a complejas, de forma automática.", "rightAnswer": "A resposta correcta é: Es un subcampo basado en redes neuronales multicapa que aprenden representaciones jerárquicas de los datos.", "hasCorrectMarked": true}, {"num": 6, "status": "incorrect", "question": "¿Qué métrica de evaluación de regresión penaliza más severamente los errores grandes (y por tanto, es más sensible a los valores atípicos u outliers)?", "options": [{"text": "a. Accuracy (Exactitud).", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Métrica de clasificación."}, {"text": "b. Recall (Sensibilidad).", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Error Cuadrático Medio (MSE).", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Error Absoluto Medio (MAE).", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "ElError Cuadrático Medio (MSE)eleva al cuadrado las diferencias entre predicción y valor real. Esto hace que los errores grandes \"pesen\" mucho más en el resultado final que los errores pequeños, a diferencia del MAE (Error Absoluto Medio) que los trata linealmente.", "rightAnswer": "A resposta correcta é: Error Cuadrático Medio (MSE).", "hasCorrectMarked": true}, {"num": 7, "status": "incorrect", "question": "¿Cuál de estos modelos es inherentemente más robusto a valores atípicos (outliers) en las variables de entrada?", "options": [{"text": "a. Árboles de Decisión", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Regresión Lineal", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Regresión Logística", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. K-Means", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Los centroides se calculan como la media, la cual es extremadamente sensible a valores extremos."}], "feedback": "Los Árboles de Decisión parten el espacio basándose en umbrales de valor, por lo que un valor extremadamente alto no afecta al resto de divisiones, a diferencia de modelos basados en medias o distancias.", "rightAnswer": "A resposta correcta é: Árboles de Decisión", "hasCorrectMarked": true}, {"num": 8, "status": "notanswered", "question": "Tienes un dataset con valores faltantes. ¿Qué criterio distingue mejor MAR de MNAR ?", "options": [{"text": "a. En MAR, la causa está capturada por variables observadas; en MNAR depende de información no observada (o del propio valor).", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. En MAR siempre basta borrar filas sin sesgo; en MNAR siempre basta imputar con la media.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. MAR implica que el valor faltante nunca influye; MNAR implica que siempre influye.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. En MAR el patrón es completamente aleatorio; en MNAR también.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "La diferencia clave esdónde está la causade la ausencia: en variables observadas (MAR) o en información no observada / el propio valor faltante (MNAR).", "rightAnswer": "A resposta correcta é: En MAR, la causa está capturada por variables observadas; en MNAR depende de información no observada (o del propio valor).", "hasCorrectMarked": true}, {"num": 9, "status": "correct", "question": "Un banco quiere detectar usos fraudulentos de tarjetas de crédito. Su base de datos contiene 2 millones de transacciones con: fecha, hora, localización, cantidad, tipo de comercio y saldos del titular. ¿Cómo debe plantearse este problema?", "options": [{"text": "a. Aprendizaje no supervisado, detección de anomalías, identificando transacciones que se desvían significativamente del patrón normal", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Sin etiquetas, buscamos comportamientos anómalos que podrían indicar fraude."}, {"text": "b. Regresión supervisada para predecir la probabilidad numérica de fraude de cada transacción", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Clustering con K-means para agrupar transacciones y considerar fraudulentos los clusters más pequeños", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Aprendizaje supervisado de clasificación binaria, entrenando con transacciones fraudulentas y legítimas identificadas", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Sin etiquetas de fraude, debemos usar aprendizaje no supervisado. La detección de fraude sin etiquetas es un caso típico de detección de anomalías.", "rightAnswer": "A resposta correcta é: Aprendizaje no supervisado, detección de anomalías, identificando transacciones que se desvían significativamente del patrón normal", "hasCorrectMarked": true}, {"num": 10, "status": "notanswered", "question": "¿Cuál es la función conceptual principal del conjunto de validación (validation set) en el ciclo de vida del ML?", "options": [{"text": "a. Incrementar la cantidad de datos disponibles para entrenar el modelo.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Reducir el coste computacional durante el entrenamiento.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Ajustar hiperparámetros y comparar diferentes modelos sin comprometer la evaluación final.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Evaluar de forma definitiva el rendimiento del modelo en producción.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El conjunto de validación actúa como un proxy para evaluar decisiones de modelado (hiperparámetros, elección de algoritmo) sin contaminar la evaluación final, que se reserva para el conjunto de Test.", "rightAnswer": "A resposta correcta é: Ajustar hiperparámetros y comparar diferentes modelos sin comprometer la evaluación final.", "hasCorrectMarked": true}, {"num": 11, "status": "correct", "question": "La reducción de dimensionalidad es una técnica importante en aprendizaje no supervisado. ¿Cuál es el objetivo de la reducción de dimensionalidad y qué beneficios proporciona?", "options": [{"text": "a. Crear nuevas variables artificiales combinando las originales para capturar interacciones no lineales entre features.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Eliminar outliers y datos ruidosos del dataset para mejorar la calidad de los datos de entrenamiento.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Reducir el número de variables en un dataset, útil cuando hay características redundantes o irrelevantes; beneficios incluyen menor tiempo de entrenamiento y mejor precisión del modelo.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. La reducción de dimensionalidad simplifica el problema eliminando información redundante, lo que puede mejorar tanto la eficiencia como el rendimiento del modelo."}, {"text": "d. Reducir el número de instancias en un dataset mediante muestreo estratificado para acelerar el entrenamiento en datasets muy grandes.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Reducción de dimensionalidadbusca reducir el número de variables (features) en un dataset. Es útil cuando se trabaja con datos de alta dimensionalidad donde algunas características pueden ser redundantes o irrelevantes. Los beneficios incluyen: reducir el tiempo de entrenamiento, mejorar la precisión del modelo (evitando la \"maldición de la dimensionalidad\"), y facilitar la visualización. Una técnica común esPrincipal Component Analysis (PCA).", "rightAnswer": "A resposta correcta é:Reducir el número de variables en un dataset, útil cuando hay características redundantes o irrelevantes; beneficios incluyen menor tiempo de entrenamiento y mejor precisión del modelo.", "hasCorrectMarked": true}, {"num": 12, "status": "incorrect", "question": "¿Qué indica un Coeficiente de Silueta (Silhouette Score) cercano a +1?", "options": [{"text": "a. Que el modelo ha sobreajustado (overfitting).", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. No aplica directamente en este sentido."}, {"text": "b. Que los clusters están densos y bien separados entre sí.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Que los clusters se solapan significativamente.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Que las muestras han sido asignadas al cluster equivocado.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El coeficiente de silueta va de -1 a 1. Un valor cercano a +1 indica que las muestras están bien separadas de los clusters vecinos y bien agrupadas dentro de su propio cluster. 0 indica solapamiento, y valores negativos indican asignación errónea.", "rightAnswer": "A resposta correcta é: Que los clusters están densos y bien separados entre sí.", "hasCorrectMarked": true}, {"num": 13, "status": "incorrect", "question": "Cuando se utiliza K-Nearest Neighbors para una tarea de regresión (predecir un valor numérico continuo) en lugar de clasificación, ¿cómo determina el algoritmo el valor de salida para una nueva instancia?", "options": [{"text": "a. Realiza una \"votación\" y asigna el valor numérico más frecuente (moda) entre los vecinos.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Asigna el valor del vecino más cercano individual (K=1) ignorando el resto de K vecinos.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Falso. Eso sería solo si K=1 explícitamente."}, {"text": "c. Calcula el centroide geométrico de los vecinos y devuelve su distancia.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Calcula el promedio aritmético de los valores objetivo de los K vecinos más cercanos.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "En regresión, KNN calcula el promedio (o promedio ponderado) de los valores objetivo de los K vecinos más cercanos. No usa \"moda\" ni voto mayoritario.", "rightAnswer": "A resposta correcta é: Calcula el promedio aritmético de los valores objetivo de los K vecinos más cercanos.", "hasCorrectMarked": true}, {"num": 14, "status": "correct", "question": "En un modelo, usas una función de pérdida durante entrenamiento y una métrica para evaluación. ¿Cuál es la distinción conceptual más relevante?", "options": [{"text": "a. Es un error que confundirá la interpretación de la calidad del modelo. La métrica siempre debe ser igual a la pérdida.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. La pérdida suele ser optimizable, mientras la métrica mide desempeño y puede ser más interpretable.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Esa es una distinción habitual."}, {"text": "c. La pérdida se calcula en test; la métrica solo en entrenamiento.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. La métrica es para optimizar y la pérdida solo para reportar.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "La pérdida se optimiza (a menudo requiere suavidad/diferenciabilidad); la métrica refleja el objetivo y puede no ser optimizable directamente.", "rightAnswer": "A resposta correcta é:La pérdida suele ser optimizable, mientras la métrica mide desempeño y puede ser más interpretable.", "hasCorrectMarked": true}, {"num": 15, "status": "correct", "question": "Los histogramas de las variables T3, TT4 y FTI (marcadores de función tiroidea) en un problema de predicción de enfermedades de tiroides muestran distribuciones aproximadamente normales (campana de Gauss) . ¿Por qué es esperado este patrón en datos médicos como estos?", "options": [{"text": "a. Indica que estas variables no tienen utilidad predictiva.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Indica que los datos fueron artificialmente manipulados para parecer normales.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Es esperado para métricas biológicas en población mayormente sana; valores alejados de la media típicamente indican patología.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. El \"normal\" biológico corresponde aproximadamente a la distribución normal estadística."}, {"text": "d. Significa que hay un error porque los datos de los pacientes con enfermedades no tienden a ser normales.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Las distribuciones aproximadamente normales sonesperadas para métricas biológicas en poblaciones principalmente sanas. En un dataset donde ~90% son casos \"negativos\" (sin enfermedad), la mayoría de pacientes tienen valores cercanos al promedio poblacional saludable. Valores extremos son infrecuentes y típicamente indican patología (hipotiroidismo o hipertiroidismo). Esto es la base del diagnóstico médico: valores que se desvían significativamente de la \"normalidad\" poblacional son señales de alerta. Los outliers visibles en el histograma pueden representar casos patológicos legítimos.", "rightAnswer": "A resposta correcta é:Es esperado para métricas biológicas en población mayormente sana; valores alejados de la media típicamente indican patología.", "hasCorrectMarked": true}, {"num": 16, "status": "notanswered", "question": "¿Cómo funciona regresión logística y qué tipo de problemas resuelve?", "options": [{"text": "a. Regresión para variables continuas que aplica transformación logarítmica al target antes de ajustar el modelo", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Técnica de dimensionalidad que proyecta datos en un espacio donde las clases son linealmente separables", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Clasificación binaria que aplica función sigmoide a combinación lineal para obtener probabilidades (0-1).", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Modelo que predice el logaritmo del target y requiere transformación inversa para obtener predicciones", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Regresión Logísticaes un modelo declasificación binaria(extensible a multiclase). Combina regresión lineal con lafunción sigmoide: σ(z) = 1/(1+e^(-z)), donde z = β₀ + β₁X₁ + .... Esto transforma cualquier valor real en unaprobabilidad entre 0 y 1. El modelo predice P(y=1|X) y se optimiza minimizandocross-entropy loss(log loss). El umbral típico para clasificar es 0.5, pero puede ajustarse.", "rightAnswer": "A resposta correcta é:Clasificación binaria que aplica función sigmoide a combinación lineal para obtener probabilidades (0-1).", "hasCorrectMarked": true}, {"num": 17, "status": "incorrect", "question": "La clasificación tiene diferentes variantes según el número y tipo de etiquetas. ¿Cuál es la diferencia entre clasificación binaria , multiclase y multietiqueta ?", "options": [{"text": "a. Binaria solo funciona con datos balanceados, multiclase tolera cierto desbalance, y multietiqueta está diseñada específicamente para datos muy desbalanceados", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Binaria tiene alta precisión pero baja cobertura, multiclase equilibra ambas, y multietiqueta maximiza cobertura sacrificando precisión", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Binaria tiene dos clases excluyentes; multiclase tiene más de dos clases excluyentes; multietiqueta permite asignar múltiples etiquetas simultáneas a una instancia", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Binaria tiene dos clases excluyentes; multiclase permite asignar varias clases a cada muestra; multietiqueta indica que existen más de dos posibles etiquetas.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto."}], "feedback": "Los tres tipos de clasificación se distinguen por el número de clases posibles y si pueden coexistir:Binaria: la salida tiene exactamente dos clases mutuamente excluyentes (spam/no spam, positivo/negativo).Multiclase: la salida tiene más de dos clases mutuamente excluyentes (dígitos 0-9, tipos de animales).Multietiqueta: una instancia puede tener múltiples etiquetas simultáneamente (etiquetar música con múltiples géneros a la vez).", "rightAnswer": "A resposta correcta é: Binaria tiene dos clases excluyentes; multiclase tiene más de dos clases excluyentes; multietiqueta permite asignar múltiples etiquetas simultáneas a una instancia", "hasCorrectMarked": true}, {"num": 18, "status": "correct", "question": "¿Qué técnica o algoritmo se utiliza comúnmente para reducir la dimensionalidad de un conjunto de datos?", "options": [{"text": "a. K-Means", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Normalizador", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Análisis de Componentes Principales (PCA)", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto."}, {"text": "d. Bagging", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "ElAnálisis de Componentes Principales (PCA)es la técnica de reducción de dimensionalidad lineal más conocida. Proyecta los datos en componentes ortogonales que capturan la máxima varianza.", "rightAnswer": "A resposta correcta é:Análisis de Componentes Principales (PCA)", "hasCorrectMarked": true}, {"num": 19, "status": "notanswered", "question": "¿Qué acción específica constituye \"Model Selection Leakage\" (fuga de selección de modelo)?", "options": [{"text": "a. Usar el conjunto de test para comparar múltiples modelos o ajustar hiperparámetros.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Incluir la variable objetivo en las features de entrenamiento.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Normalizar los datos antes de dividir en train y test.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Usar validación cruzada sobre el conjunto de entrenamiento.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "ElModel Selection Leakageocurre cuando se usa el conjunto de test para comparar modelos o ajustar hiperparámetros. Al hacer esto, las decisiones de modelado se \"contaminan\" con información del test set, sesgando las métricas de evaluación final. El test set debe reservarse EXCLUSIVAMENTE para la evaluación final única. Para selección de modelos e hiperparámetros, usar validación cruzada sobre el training set.", "rightAnswer": "A resposta correcta é:Usar el conjunto de test para comparar múltiples modelos o ajustar hiperparámetros.", "hasCorrectMarked": true}, {"num": 20, "status": "correct", "question": "¿Qué mide exactamente la métrica de Accuracy (Exactitud) en un modelo de clasificación?", "options": [{"text": "a. La cantidad de verdaderos positivos dividida entre todos los positivos reales.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. La media armónica entre la precisión y el recall.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. La proporción de predicciones correctas sobre el total de predicciones realizadas.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. (TP+TN) / (TP+TN+FP+FN)."}, {"text": "d. La proporción de predicciones positivas correctas sobre todas las predicciones positivas.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El Accuracy es la proporción total de predicciones correctas (tanto positivas como negativas) sobre el total de casos evaluados. Fórmula: (TP + TN) / Total. Es útil cuando las clases están balanceadas, pero engañosa si existe desbalance severo.", "rightAnswer": "A resposta correcta é: La proporción de predicciones correctas sobre el total de predicciones realizadas.", "hasCorrectMarked": true}, {"num": 21, "status": "incorrect", "question": "En la construcción de un Pipeline de scikit-learn, ¿qué requisito técnico deben cumplir obligatoriamente todos los pasos intermedios (todos excepto el último)?", "options": [{"text": "a. Deben ser exclusivamente métodos de escalado numérico (como StandardScaler ).", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Pueden ser cualquier transformador, incluyendo imputadores o codificadores, no solo escaladores."}, {"text": "b. Deben ser estimadores finales (implementar solo predict ) para generar salidas intermedias.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Deben ser transformadores (implementar fit y transform ) para pasar la salida modificada al siguiente paso.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Deben implementar fit_predict para clasificar los datos antes del paso final.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "En un Pipeline, los datos fluyen secuencialmente. Cada paso intermedio debe transformar los datos para el siguiente, por lo que deben implementar los métodosfitytransform. El último paso puede ser simplemente un estimador (solofit).", "rightAnswer": "A resposta correcta é: Deben ser transformadores (implementarfitytransform) para pasar la salida modificada al siguiente paso.", "hasCorrectMarked": false}, {"num": 22, "status": "notanswered", "question": "Para predecir la demora de vuelos, se dispone de horarios programados y reales. ¿Qué tipo de abordaje es más adecuado?", "options": [{"text": "a. Detección de anomalías", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Regresión seguida de post-procesamiento", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Clasificación binaria", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Clasificación multiclase", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Abordarlo comoRegresión seguida de post-procesamientopreserva más información. Al predecir los minutos exactos, sabemos no solo SI llegará tarde, sino CUAN tarde. Si necesitamos clasificar, siempre podemos aplicar un umbral (ej. >15 min) sobre la salida de la regresión, pero no podemos recuperar los minutos exactos desde una simple clasificación binaria.", "rightAnswer": "A resposta correcta é:Regresión seguida de post-procesamiento", "hasCorrectMarked": true}, {"num": 23, "status": "incorrect", "question": "La matriz de confusión resume el rendimiento de un clasificador. Para clasificación binaria, ¿cuáles son los cuatro componentes de la matriz de confusión?", "options": [{"text": "a. TP (predicho +, real +), TN (predicho -, real -), FP (predicho +, real -), FN (predicho -, real +); base para calcular todas las métricas", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Sensitivity, Specificity, PPV, NPV: métricas médicas equivalentes a los componentes de la matriz", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Training error, validation error, test error, generalization error: componentes del análisis de error", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Precision, Recall, Accuracy, F1: las cuatro métricas principales mostradas en forma de matriz", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Esas son métricas DERIVADAS de la matriz de confusión, no los componentes de la matriz misma (TP, TN, FP, FN)."}], "feedback": "La matriz de confusión 2×2 tiene:True Positives (TP): predicho positivo, realmente positivo.True Negatives (TN): predicho negativo, realmente negativo.False Positives (FP): predicho positivo, realmente negativo (error Tipo I).False Negatives (FN): predicho negativo, realmente positivo (error Tipo II). De estos cuatro números se derivan todas las métricas: Accuracy=(TP+TN)/total, Precision=TP/(TP+FP), Recall=TP/(TP+FN), etc.", "rightAnswer": "A resposta correcta é: TP (predicho +, real +), TN (predicho -, real -), FP (predicho +, real -), FN (predicho -, real +); base para calcular todas las métricas", "hasCorrectMarked": true}, {"num": 24, "status": "correct", "question": "En un sistema de filtrado de spam (donde Positivo = Spam), se decide priorizar una alta precisión . ¿Qué consecuencia práctica tiene esto?", "options": [{"text": "a. El sistema tendrá un Accuracy perfecto.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Se evita enviar correos legítimos a la carpeta de spam, pero veremos más spam en la bandeja de entrada.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Se minimizan los Falsos Positivos a costa de aumentar Falsos Negativos (spam no detectado)."}, {"text": "c. El sistema detectará absolutamente todo el spam existente.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Se bloquearán por error muchos correos legítimos importantes.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Priorizar la precisión en un filtro de spam significa que queremos minimizar el riesgo de marcar un correo legítimo como spam (Falso Positivo), porque perder un correo importante es grave. La consecuencia es que seremos más tolerantes con el spam, dejando pasar algunos correos no deseados a la bandeja de entrada (Falsos Negativos).", "rightAnswer": "A resposta correcta é: Se evita enviar correos legítimos a la carpeta de spam, pero veremos más spam en la bandeja de entrada.", "hasCorrectMarked": true}, {"num": 25, "status": "notanswered", "question": "¿Cuál es la diferencia fundamental en cómo se construyen los árboles en Random Forest (Bagging) versus XGBoost (Boosting)?", "options": [{"text": "a. Random Forest usa árboles más profundos que XGBoost para capturar más complejidad.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Random Forest construye árboles con el dataset completo, mientras que Boosting usa solo un subconjunto de características.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Random Forest construye árboles independientes en paralelo, mientras que Boosting construye árboles secuencialmente donde cada árbol corrige los errores de los anteriores.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Random Forest optimiza una función de pérdida vía descenso de gradiente, mientras que Boosting usa voto mayoritario.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Random Forest (Bagging) construye múltiples árboles independientes en paralelo (cada uno ve una muestra ligeramente distinta), y promedia sus resultados para reducir varianza. Boosting (XGBoost) construye árboles secuencialmente, donde cada nuevo árbol intenta corregir los errores residuales de la combinación de los árboles anteriores.", "rightAnswer": "A resposta correcta é: Random Forest construye árboles independientes en paralelo, mientras que Boosting construye árboles secuencialmente donde cada árbol corrige los errores de los anteriores.", "hasCorrectMarked": true}, {"num": 26, "status": "incorrect", "question": "Una ciudad implementa un sistema inteligente que ajusta en tiempo real los semáforos para optimizar el flujo de tráfico, basándose en indicadores numéricos de congestión. Este sistema aprende a tomar decisiones óptimas (cambiar luz) a través de la interacción continua con el entorno aprendiendo a reducir la congestión. ¿Qué enfoque de aprendizaje se utiliza?", "options": [{"text": "a. Clustering", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Aprendizaje por Refuerzo (Reinforcement Learning)", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Regresión Supervisada", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto."}, {"text": "d. Clasificación Supervisada", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El sistema aprende interactuando (prueba y error) con un entorno dinámico para maximizar una señal de recompensa acumulada. Esto es la definición deAprendizaje por Refuerzo (Reinforcement Learning).", "rightAnswer": "A resposta correcta é:Aprendizaje por Refuerzo (Reinforcement Learning)", "hasCorrectMarked": true}, {"num": 27, "status": "incorrect", "question": "¿Qué afirmación resume mejor el trade-off entre normalización min-max y estandarización Z-score respecto a outliers?", "options": [{"text": "a. Min-max puede distorsionarse mucho por un outlier.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Min-max elimina outliers al mapearlos a 0 o 1.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Z-score es completamente inmune a outliers.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Z-score solo se aplica si los datos están en [0,1].", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Eso confunde con min-max."}], "feedback": "Min-max es muy sensible a outliers porque fija rango con mínimos/máximos; Z-score usa media/desviación (también afectables), pero el “aplastamiento” por extremos es especialmente directo en min-max.", "rightAnswer": "A resposta correcta é:Min-max puede distorsionarse mucho por un outlier.", "hasCorrectMarked": true}, {"num": 28, "status": "notanswered", "question": "Considere dos acciones de preprocesamiento: Ajustar (fit) un StandardScaler en todo el conjunto de datos (Train + Test) antes de dividir. Reemplazar valores de \"Age > 150\" con NaN en todo el conjunto de datos antes de dividir. ¿Qué afirmación evalúa correctamente el Data Leakage?", "options": [{"text": "a. La acción 1 causa Data Leakage porque usa la distribución del test set. La acción 2 no causa leakage significativo porque usa conocimiento del dominio (reglas externas), no estadísticas de los datos.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. La acción 1 es segura porque el escalado es una transformación lineal reversible. La acción 2 es leakage porque altera los datos.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Ambas acciones causan Data Leakage y deben esperar estrictamente a después de la división.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Ambas son seguras si usamos validación cruzada.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "La Acción 1 causa Data Leakage porque las estadísticas (media, desviación) se calculan usando información del Test set. La Acción 2 es segura porque se basa en conocimiento del dominio (una regla fija: edad biológica máxima) que es independiente de la distribución de los datos muestreados. Limpiar errores de datos basándose en reglas externas universales antes del split es aceptable.", "rightAnswer": "A resposta correcta é:La acción 1 causa Data Leakage porque usa la distribución del test set. La acción 2 no causa leakage significativo porque usa conocimiento del dominio (reglas externas), no estadísticas de los datos.", "hasCorrectMarked": true}, {"num": 29, "status": "incorrect", "question": "Durante el entrenamiento de Q-Learning, epsilon (ε) típicamente decrece. ¿Por qué es importante decaer epsilon durante el entrenamiento?", "options": [{"text": "a. Reduce progresivamente el learning rate para obtener convergencia más estable hacia el final del entrenamiento", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Eso sería learning rate scheduling. Epsilon decay reduce exploración aleatoria, no la magnitud de las actualizaciones de Q-values."}, {"text": "b. Aumenta la exploración conforme avanza el entrenamiento para escapar de mínimos locales en la Q-Table", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Permite transicionar de mucha exploración inicial para descubrir el entorno, a más explotación posterior para usar el conocimiento aprendido", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Compensa el crecimiento de los Q-values para mantenerlos en un rango numérico estable", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Elepsilon decaypermite transicionar deexploración inicialaexplotación posterior. Al inicio (ε ≈ 1), el agente explora mucho para descubrir el entorno. Conforme aprende, ε decrece (hacia un mínimo como 0.01), y el agente explota más su conocimiento. Esto asegura que: (1) El agente no se atasque en políticas subóptimas tempranas. (2) El agente use su conocimiento aprendido en lugar de actuar aleatoriamente. (3) Mantiene algo de exploración (ε_min > 0) para adaptarse a cambios.", "rightAnswer": "A resposta correcta é:Permite transicionar de mucha exploración inicial para descubrir el entorno, a más explotación posterior para usar el conocimiento aprendido", "hasCorrectMarked": true}, {"num": 30, "status": "notanswered", "question": "One-hot encoding crea una columna binaria por categoría. ¿Qué trade-off importante aparece cuando una variable tiene muchísimas categorías o categorías raras?", "options": [{"text": "a. Hace que un modelo lineal se vuelva no lineal automáticamente.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Impide manejar categorías desconocidas en producción.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Crece la dimensionalidad, lo que puede ralentizar y empeorar señal/ruido en categorías raras.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Obliga a que las categorías tengan un orden natural.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "One-hot puede disparar el número de columnas, ralentizar entrenamiento y generar columnas con muy poca señal (categorías raras).", "rightAnswer": "A resposta correcta é: Crece la dimensionalidad, lo que puede ralentizar y empeorar señal/ruido en categorías raras.", "hasCorrectMarked": true}, {"num": 31, "status": "correct", "question": "¿Qué tipo de predictor se utiliza para asignar etiquetas categóricas/discretas a datos de entrada?", "options": [{"text": "a. Normalizador", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Clasificador", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto."}, {"text": "c. Clusterizador", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Reductor de dimensionalidad", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "UnClasificadores un algoritmo de aprendizaje supervisado diseñado para predecir categorías o clases discretas (ej. Spam/No Spam, Perro/Gato). Esto contrasta con un Regresor, que predice valores continuos.", "rightAnswer": "A resposta correcta é:Clasificador", "hasCorrectMarked": true}, {"num": 32, "status": "notanswered", "question": "¿Cuál es el propósito de seleccionar aleatoriamente un subconjunto de características en cada división (split) del árbol?", "options": [{"text": "a. Reducir el tiempo de entrenamiento drásticamente", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Manejar automáticamente los valores faltantes", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Asegurar que los árboles sean diferentes entre sí (aumentar la diversidad)", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Hacer que cada árbol se enfoque solo en la característica más importante", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "", "rightAnswer": "A resposta correcta é: Asegurar que los árboles sean diferentes entre sí (aumentar la diversidad)", "hasCorrectMarked": true}, {"num": 33, "status": "incorrect", "question": "Durante el Análisis Exploratorio de Datos (EDA), ¿cuál es el propósito principal de visualizar histogramas de las variables numéricas?", "options": [{"text": "a. Distinguir errores de datos legítimos; definir métricas apropiadas.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Identificar el modelo que se debe utilizar en función de las distibuciones y características de los datos.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Principalmente definie el preprocesamiento."}, {"text": "c. Entender las distribuciones, errores o valores faltantes para justificar decisiones de preprocesamiento.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Establecer el baseline del modelo en función de la distribución de los datos.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Los histogramas en EDA sirven para: (1)Identificar la distribuciónde cada variable (normal, sesgada, bimodal). (2)Detectar outliersy valores extremos. (3)Encontrar errores de datos(valores imposibles). (4)Identificar valores faltantes(variables con pocos conteos). (5)Informar decisiones de preprocesamiento: ¿necesita transformación log? ¿hay outliers que tratar? ¿la variable tiene utilidad? (6)Entender el rango y escalade cada variable. Todo esto guía las decisiones de limpieza y preprocesamiento antes de construir modelos.", "rightAnswer": "A resposta correcta é:Entender las distribuciones, errores o valores faltantes para justificar decisiones de preprocesamiento.", "hasCorrectMarked": true}, {"num": 34, "status": "notanswered", "question": "¿Cuál es la principal desventaja conceptual de la normalización Min-Max comparada con la estandarización (Z-score)?", "options": [{"text": "a. No mantiene la forma de la distribución de los datos", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Es muy sensible a valores atípicos (*outliers*)", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Asume que los datos siguen una distribución Normal (Gaussiana)", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Es computacionalmente más costoso que la estandarización", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Min-Max escala linealmente usando los valores mínimo y máximo. Si existe un outlier extremo, el rango se \"estira\" para incluirlo, comprimiendo la gran mayoría de datos normales en un intervalo diminuto, perdiendo resolución y afectando el aprendizaje.", "rightAnswer": "A resposta correcta é: Es muy sensible a valores atípicos (*outliers*)", "hasCorrectMarked": true}, {"num": 35, "status": "correct", "question": "En el contexto de la librería scikit-learn , ¿cuál es la función esencial de la clase Pipeline ?", "options": [{"text": "a. Encapsular una serie de pasos de transformación y un estimador final para automatizar y asegurar la corrección del flujo de datos.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto."}, {"text": "b. Garantizar la ejecución paralela de múltiples modelos para mejorar la eficiencia del procesamiento de datos en GPU.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Orquestar la recolección y limpieza de datos de forma autónoma.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Integrar métodos de validación y selección de características en un solo objeto para visualización gráfica.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "El objetoPipelinepermite encapsular secuencialmente una serie de transformadores de preprocesamiento y un estimador final. Esto simplifica el código, asegura que las transformaciones se apliquen consistentemente en entrenamiento y test, y crucialmente, ayuda a evitar elData Leakagedurante la validación cruzada.", "rightAnswer": "A resposta correcta é: Encapsular una serie de pasos de transformación y un estimador final para automatizar y asegurar la corrección del flujo de datos.", "hasCorrectMarked": true}, {"num": 36, "status": "correct", "question": "En un sistema de videovigilancia para detectar ladrones, se decide configurar el modelo para tener una muy alta exhaustividad (Recall) , aunque esto sacrifique la precisión. ¿Qué comportamiento observaremos en el sistema?", "options": [{"text": "a. El sistema detectará casi todos los ladrones reales, pero generará muchas falsas alarmas (detectará inocentes como ladrones).", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Maximiza TP, aumenta FP."}, {"text": "b. El sistema tendrá una Accuracy del 100%.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. El sistema detectará únicamente a los ladrones cuando esté 100% seguro, ignorando casos dudosos.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. El sistema tendrá muy pocos falsos positivos y muy pocos falsos negativos simultáneamente.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Alta exhaustividad (Recall) significa que el sistema intenta encontrartodoslos casos positivos (ladrones) a toda costa. La consecuencia directa es que será más \"paranoico\" y generará más falsas alarmas (Falsos Positivos), es decir, detectará a personas inocentes como ladrones con tal de no dejar escapar a ningún ladrón real.", "rightAnswer": "A resposta correcta é: El sistema detectará casi todos los ladrones reales, pero generará muchas falsas alarmas (detectará inocentes como ladrones).", "hasCorrectMarked": true}, {"num": 37, "status": "incorrect", "question": "Si se tienen imágenes de dígitos escritos a mano sin saber a priori qué número representa cada imagen y se desea agruparlas automáticamente en 10 categorías basadas en similitud visual, ¿qué enfoque es el adecuado?", "options": [{"text": "a. Clustering (Agrupamiento no supervisado).", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Regresión supervisada.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Requiere valores objetivo continuos."}, {"text": "c. Aprendizaje reforzado.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Clasificación supervisada.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Al no tener etiquetas, no podemos usar métodos supervisados (Clasificación/Regresión). Queremos encontrar estructura (grupos) en los datos, por lo que el enfoque correcto esClustering(Agrupamiento), una técnica de aprendizaje no supervisado.", "rightAnswer": "A resposta correcta é: Clustering (Agrupamiento no supervisado).", "hasCorrectMarked": true}, {"num": 38, "status": "notanswered", "question": "En el contexto del diseño de Scikit-learn, ¿qué capacidad específica distingue a un Transformer de un Estimator genérico?", "options": [{"text": "a. Un Transformer se usa estrictamente para arquitecturas de redes neuronales de deep learning.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Un Transformer solo puede usarse en el último paso de un Pipeline para hacer predicciones.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Un Transformer es un estimador que no aprende ningún parámetro de los datos.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Un Transformer implementa un método transform() para modificar los datos (ej. escalado, encoding) tras aprender parámetros con fit() .", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "UnTransformeres un tipo especial de Estimator que, además del métodofit()común a todos los estimadores, implementa un métodotransform(). Este método permite modificar los datos de entrada (por ejemplo, escalándolos o codificándolos) utilizando los parámetros aprendidos durante elfit(). La combinaciónfit_transform()es un atajo común. Los Transformers son los bloques intermedios fundamentales de cualquier Pipeline de preprocesamiento.", "rightAnswer": "A resposta correcta é: Un Transformer implementa un métodotransform()para modificar los datos (ej. escalado, encoding) tras aprender parámetros confit().", "hasCorrectMarked": false}, {"num": 39, "status": "incorrect", "question": "La detección de anomalías es una tarea importante de aprendizaje no supervisado. ¿Cuál es el objetivo de la detección de anomalías y cuáles son sus aplicaciones típicas?", "options": [{"text": "a. Identificar puntos de datos inusuales que se desvían significativamente de la norma; aplicaciones incluyen detección de fraude, monitorización de sistemas y seguridad", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Clasificar transacciones como fraudulentas o legítimas usando un modelo entrenado con ejemplos etiquetados de ambas clases.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. Eso sería clasificación supervisada. La detección de anomalías (no supervisada) identifica datos atípicos sin necesidad de ejemplos etiquetados de fraude."}, {"text": "c. Predecir cuándo un sistema fallará en el futuro basándose en datos históricos de fallos anteriores", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Validar la integridad de datos importados de fuentes externas verificando que cumplan reglas de negocio predefinidas", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Detección de anomalíasse enfoca en identificar puntos de datos o patrones inusuales que se desvían significativamente de la norma. Se utiliza en:detección de fraude(transacciones bancarias sospechosas),monitorización de sistemas(detectar fallos en servidores), yseguridad(identificar intrusiones en redes). Las anomalías pueden indicar errores, ataques o simplemente datos que merecen atención especial.", "rightAnswer": "A resposta correcta é: Identificar puntos de datos inusuales que se desvían significativamente de la norma; aplicaciones incluyen detección de fraude, monitorización de sistemas y seguridad", "hasCorrectMarked": true}, {"num": 40, "status": "correct", "question": "¿Qué afirmación captura mejor cómo evitar fuga de datos al usar un conjunto de test?", "options": [{"text": "a. El test puede guiar la selección de modelo si se mantiene fijo y no se remuestrea.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. El test solo debe ser más grande que el train para evitar varianza.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. El test puede usarse para ajustar hiperparámetros si el ajuste es pequeño.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. El test debe simular datos no vistos; cualquier flujo de información desde test invalida la estimación.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. El test solo se usa para una evaluación final, sin retroalimentar decisiones."}], "feedback": "El conjunto de test debe comportarse como datos realmente no vistos: no debe influir en transformaciones, selección de modelo o ajuste de hiperparámetros.", "rightAnswer": "A resposta correcta é: El test debe simular datos no vistos; cualquier flujo de información desde test invalida la estimación.", "hasCorrectMarked": true}, {"num": 41, "status": "notanswered", "question": "Si observamos una fuerte correlación lineal entre dos variables en nuestros datos:", "options": [{"text": "a. Significa que el error del modelo será cero.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Podemos modelar su relación matemática, pero la correlación no prueba causalidad por sí misma.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Significa definitivamente que la variable independiente causa cambios en la dependiente.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. No podemos usar regresión lineal si no hay prueba de causalidad.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "La correlación indica asociación lineal, pero no implica necesariamente que una variable cause la otra. Se requiere conocimiento del dominio para justificar suposiciones causales.", "rightAnswer": "A resposta correcta é: Podemos modelar su relación matemática, pero la correlación no prueba causalidad por sí misma.", "hasCorrectMarked": true}, {"num": 42, "status": "incorrect", "question": "K-Nearest Neighbors (KNN) se clasifica como un algoritmo de \"Lazy Learning\" (aprendizaje perezoso). ¿Qué implicación directa tiene esto en términos de recursos computacionales?", "options": [{"text": "a. Es \"perezoso\" porque solo utiliza una pequeña fracción aleatoria de los datos para predecir, ignorando el resto.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. El tiempo de \"entrenamiento\" es casi nulo (solo almacenamiento), pero el tiempo de predicción es alto y crece con el tamaño del dataset, requiriendo mucha memoria RAM.", "correct": true, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Requiere re-entrenamiento completo cada vez que se quiere hacer una nueva predicción.", "correct": false, "selected": true, "selected_wrong": true, "feedback": "Incorrecto. No hay \"re-entrenamiento\", solo consulta."}, {"text": "d. Consume muy poca memoria RAM porque resume los datos en unos pocos parámetros (medias y varianzas).", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Al no construir un modelo interno (fórmulas, coeficientes) durante el entrenamiento, KNN traslada todo el coste computacional al momento de la predicción, donde debe consultar todo el dataset.", "rightAnswer": "A resposta correcta é: El tiempo de \"entrenamiento\" es casi nulo (solo almacenamiento), pero el tiempo de predicción es alto y crece con el tamaño del dataset, requiriendo mucha memoria RAM.", "hasCorrectMarked": true}, {"num": 43, "status": "correct", "question": "La regresión lineal es uno de los modelos más fundamentales de ML. ¿Cuál es el supuesto básico de la regresión lineal y qué optimiza durante el entrenamiento?", "options": [{"text": "a. Asume relación lineal y = β₀ + β₁X₁ + ... y minimiza MSE (Mean Squared Error) entre predicciones y valores reales.", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. OLS encuentra los coeficientes que minimizan la suma de errores cuadráticos, produciendo la \"mejor línea\" para los datos."}, {"text": "b. Promedia los residuos de los vecinos más cercanos ponderados por distancia", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Asume relación exponencial y busca maximizar la correlación entre variables usando gradient descent", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Encuentra el hiperplano que maximiza el margen entre clases positivas y negativas", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}], "feedback": "Regresión Linealasume una relación lineal entre las features (X) y el target (y): y = β₀ + β₁X₁ + β₂X₂ + ... + ε. Durante el entrenamiento, minimiza elMean Squared Error (MSE)entre predicciones y valores reales: Σ(yᵢ - ŷᵢ)² / n. El método deOrdinary Least Squares (OLS)encuentra los coeficientes β que minimizan este error. Es eficiente, interpretable, pero asume linealidad y es sensible a outliers.", "rightAnswer": "A resposta correcta é:Asume relación lineal y = β₀ + β₁X₁ + ... y minimiza MSE (Mean Squared Error) entre predicciones y valores reales.", "hasCorrectMarked": true}, {"num": 44, "status": "correct", "question": "¿Cuál es el propósito principal de dividir los datos en conjuntos de entrenamiento (train) y prueba (test) ?", "options": [{"text": "a. Para evitar sobreajustar el modelo a los datos de entrenamiento.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Para reducir la complejidad computacional durante la fase de validación.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Para evitar el \"Data Leakage\" (fuga de datos), asegurando que el modelo y los transformadores tengan en cuenta la información estadística (media, desviación) del conjunto de prueba.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Evaluar la capacidad de generalización del modelo a datos no vistos y detectar overfitting", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Es la forma de verificar que el modelo funciona con datos nuevos, no solo los de entrenamiento."}], "feedback": "La división train-test sirve paraevaluar la capacidad de generalizacióndel modelo a datos no vistos. El modelo se entrena SOLO con datos de train. Luego se evalúa con datos de test que NUNCA vio durante entrenamiento. Si el error en test es mucho mayor que en train, hay overfitting. Estopreviene el sobreajusteal revelar si el modelo realmente aprendió patrones generalizables o solo memorizó el dataset de entrenamiento.", "rightAnswer": "A resposta correcta é: Evaluar la capacidad de generalización del modelo a datos no vistos y detectar overfitting", "hasCorrectMarked": true}, {"num": 45, "status": "correct", "question": "En NumPy, ¿qué representa el valor np.nan y qué requisito impone al array que lo contiene?", "options": [{"text": "a. Es un valor faltante que limita procesar el array con operaciones matriciales mientras no sea preprocesado.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Es un valor desconocido que convierte la matriz a tipo None.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Es equivalente al None de Python y convierte el array al tipo object.", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Representa un valor faltante (\"Not a Number\") y obliga a que el array sea de tipo flotante (float).", "correct": true, "selected": true, "selected_wrong": false, "feedback": "Correcto. Los enteros no tienen representación de NaN."}], "feedback": "np.nan(Not a Number) representa un valor numérico faltante o indefinido. Al ser un valor de punto flotante especial (IEEE 754), cualquier array que contengaNaNdebe ser necesariamente de tipofloat(no puede ser entero).", "rightAnswer": "A resposta correcta é: Representa un valor faltante (\"Not a Number\") y obliga a que el array sea de tipo flotante (float).", "hasCorrectMarked": true}, {"num": 46, "status": "notanswered", "question": "Una vez entrenado, ¿cómo se deriva la política óptima a partir de la Q-Table aprendida?", "options": [{"text": "a. Elegir acciones proporcionalmente a sus Q-values usando softmax como distribución de probabilidad", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "b. Calcular el gradiente de la Q-Table y seguir la dirección de máximo aumento de recompensa", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "c. Promediar los Q-values de acciones similares para suavizar la política y reducir varianza", "correct": false, "selected": false, "selected_wrong": false, "feedback": ""}, {"text": "d. Para cada estado, elegir la acción con mayor Q-value.", "correct": true, "selected": false, "selected_wrong": f
